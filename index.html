<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bill's bad belly</title>
  <style>
:root {
  --gunmetal: #1b2027;
  --gunmetal-soft: #242b34;
  --gunmetal-light: #303946;
  --purple: #7d5f86;
  --purple-light: #b89ac0;
  --cream: #f3edf4;
  --muted: #b8b0ba;
  --shadow: rgba(0, 0, 0, 0.35);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  background: radial-gradient(circle at top, #303946 0%, var(--gunmetal) 45%, #11151a 100%);
  color: var(--cream);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

button, input, textarea { font: inherit; }

button {
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.app-shell {
  width: min(100%, 430px);
  min-height: 100vh;
  margin: 0 auto;
  padding: 22px 16px 92px;
  position: relative;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 18px;
}

.eyebrow {
  margin: 0 0 4px;
  color: var(--purple-light);
  font-size: 0.78rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

h1 {
  margin: 0;
  font-size: 2rem;
  line-height: 1;
  letter-spacing: -0.04em;
  text-transform: lowercase;
}

.logo-mark {
  width: 54px;
  height: 54px;
  border-radius: 18px;
  display: grid;
  place-items: center;
  background: linear-gradient(145deg, var(--purple), #513d59);
  box-shadow: 0 14px 30px var(--shadow), inset 0 1px 0 rgba(255,255,255,.2);
  color: white;
  font-weight: 800;
  letter-spacing: -0.08em;
  text-transform: lowercase;
}

.screen-card {
  min-height: calc(100vh - 142px);
  background: rgba(36, 43, 52, 0.78);
  border: 1px solid rgba(184, 154, 192, 0.25);
  border-radius: 28px;
  padding: 18px;
  box-shadow: 0 20px 50px var(--shadow);
  backdrop-filter: blur(12px);
}

.screen-content { display: grid; gap: 16px; }

.screen-title p {
  margin: 0 0 6px;
  color: var(--purple-light);
  font-weight: 700;
}

.screen-title h2 {
  margin: 0;
  font-size: 1.35rem;
  line-height: 1.2;
  letter-spacing: -0.03em;
}

.belly-meter,
.camera-placeholder,
.action-card,
.list-row,
.blueprint-box,
.result-card,
.food-panel,
.input-card {
  border: 1px solid rgba(184, 154, 192, 0.22);
  background: linear-gradient(145deg, rgba(48, 57, 70, 0.96), rgba(27, 32, 39, 0.95));
  border-radius: 22px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
}

.belly-meter {
  display: flex;
  gap: 16px;
  align-items: center;
  padding: 18px;
}

.icon { color: var(--purple-light); font-size: 1.55rem; line-height: 1; display: inline-grid; place-items: center; }
.icon svg { width: 24px; height: 24px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.belly-meter .icon svg { width: 42px; height: 42px; }
.camera-placeholder .icon svg { width: 54px; height: 54px; }
.nav-button .icon svg { width: 22px; height: 22px; }

.belly-meter p,
.belly-meter strong,
.belly-meter span { display: block; }
.belly-meter p { margin: 0 0 3px; color: var(--muted); }
.belly-meter strong { font-size: 1.8rem; line-height: 1; }
.belly-meter span { margin-top: 6px; color: var(--muted); font-size: .9rem; }

.segmented-control,
.mode-toggle {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 8px;
  border-radius: 18px;
  background: rgba(17, 21, 26, 0.5);
}

.mode-toggle { grid-template-columns: repeat(2, 1fr); }

.segmented-control button,
.mode-toggle button {
  border: 0;
  border-radius: 13px;
  padding: 10px 8px;
  color: var(--cream);
  background: transparent;
}

.segmented-control button.selected,
.mode-toggle button.selected {
  background: var(--purple);
  color: white;
  box-shadow: 0 10px 24px rgba(125,95,134,.28);
}

.grid.two {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

.action-card {
  padding: 16px;
  min-height: 132px;
  color: var(--cream);
  text-align: left;
}
.action-card h3 { margin: 12px 0 6px; font-size: 1rem; }
.action-card p { margin: 0; color: var(--muted); font-size: .88rem; line-height: 1.35; }

.camera-placeholder {
  display: grid;
  place-items: center;
  min-height: 230px;
  padding: 24px;
  text-align: center;
  border-style: dashed;
}
.camera-placeholder p { margin: 12px 0 4px; font-weight: 800; }
.camera-placeholder span { color: var(--muted); }

.list-stack { display: grid; gap: 10px; }
.list-row {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px;
  color: var(--cream);
  text-align: left;
}
.list-row strong { margin-left: auto; color: var(--purple-light); font-size: 1.4rem; }

.blueprint-box { padding: 14px 16px; }
.blueprint-box summary { cursor: pointer; color: var(--purple-light); font-weight: 700; }
.blueprint-box pre { white-space: pre-wrap; color: var(--muted); line-height: 1.4; font-size: .82rem; }

.bottom-nav {
  position: fixed;
  left: 50%;
  bottom: 16px;
  transform: translateX(-50%);
  width: min(calc(100% - 24px), 430px);
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  padding: 10px;
  border: 1px solid rgba(184,154,192,.28);
  border-radius: 24px;
  background: rgba(27, 32, 39, 0.94);
  box-shadow: 0 18px 50px rgba(0,0,0,.55);
  backdrop-filter: blur(14px);
}

.nav-button {
  display: grid;
  place-items: center;
  gap: 4px;
  border: 0;
  border-radius: 17px;
  padding: 10px 4px;
  background: transparent;
  color: var(--muted);
}

.nav-button span { font-size: .74rem; font-weight: 700; }
.nav-button.active {
  color: white;
  background: linear-gradient(145deg, var(--purple), #5e4867);
}

/* ---------- DAILY LOG ---------- */

.back-button {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  width: fit-content;
  border: 1px solid rgba(184, 154, 192, 0.22);
  border-radius: 16px;
  padding: 10px 14px;
  background: linear-gradient(145deg, rgba(48, 57, 70, 0.96), rgba(27, 32, 39, 0.95));
  color: var(--cream);
}

.log-section {
  display: grid;
  gap: 12px;
  padding: 16px;
  border-radius: 22px;
  border: 1px solid rgba(184, 154, 192, 0.22);
  background: linear-gradient(145deg, rgba(48, 57, 70, 0.96), rgba(27, 32, 39, 0.95));
}

.log-section h3 {
  margin: 0;
  color: var(--purple-light);
}

.tap-group {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.tap-group button {
  border: 0;
  border-radius: 14px;
  padding: 12px;
  background: rgba(17, 21, 26, 0.65);
  color: var(--cream);
}

.tap-group button.selected {
  background: var(--purple);
  color: white;
  box-shadow: 0 10px 24px rgba(125, 95, 134, 0.28);
}

.counter-control {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 12px;
}

.counter-control button {
  border: 0;
  border-radius: 16px;
  padding: 14px;
  background: rgba(17, 21, 26, 0.65);
  color: var(--cream);
}

.counter-control strong {
  font-size: 2rem;
  text-align: center;
  min-width: 48px;
}

.pain-slider { width: 100%; }

.notes-box,
.text-input,
.search-box {
  width: 100%;
  border: 1px solid rgba(184, 154, 192, 0.22);
  border-radius: 16px;
  padding: 12px;
  background: rgba(17, 21, 26, 0.5);
  color: var(--cream);
}

.notes-box {
  min-height: 90px;
  resize: vertical;
}

.text-input {
  min-height: 96px;
  resize: vertical;
}

.notes-box::placeholder,
.text-input::placeholder,
.search-box::placeholder {
  color: var(--muted);
}

.full-width { width: 100%; }

.recent-logs { display: grid; gap: 10px; }

.recent-log-card {
  display: grid;
  gap: 4px;
  padding: 14px;
  border-radius: 18px;
  border: 1px solid rgba(184, 154, 192, 0.18);
  background: rgba(17, 21, 26, 0.45);
}

.button-stack {
  display: grid;
  gap: 10px;
}

.primary-action,
.secondary-action {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 48px;
  border-radius: 16px;
  padding: 12px 16px;
  color: var(--cream);
}

.primary-action {
  border: 0;
  background: linear-gradient(145deg, var(--purple), #5e4867);
  box-shadow: 0 10px 24px rgba(125,95,134,.28);
}

.secondary-action {
  border: 1px solid rgba(184,154,192,.28);
  background: rgba(17,21,26,.5);
}

.results-panel,
.panel-list {
  display: grid;
  gap: 10px;
}

.result-card,
.food-panel,
.input-card {
  padding: 14px;
}

.result-card h3,
.food-panel h3,
.input-card h3 {
  margin: 0 0 8px;
  color: var(--purple-light);
}

.result-card p,
.input-card p {
  margin: 0;
  color: var(--muted);
  line-height: 1.4;
}

.result-card ul,
.food-panel ul {
  margin: 6px 0 0;
  padding-left: 20px;
  color: var(--cream);
}

.food-panel-title {
  display: flex;
  align-items: center;
  gap: 10px;
}

.save-notice {
  margin: 0;
  color: var(--purple-light);
  font-weight: 700;
}

.small-muted {
  color: var(--muted);
  font-size: .88rem;
}



/* ---------- BRANDED HEADER UPDATE ---------- */
.topbar {
  align-items: center;
  justify-content: flex-start;
  min-height: 92px;
  margin-bottom: 14px;
  position: relative;
}

.header-mascot-wrap {
  width: 88px;
  height: 92px;
  flex: 0 0 88px;
  overflow: hidden;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  filter: drop-shadow(0 12px 16px rgba(0,0,0,.42));
}

.header-mascot {
  width: 112px;
  height: auto;
  transform: translateY(8px);
}

.brand-title-wrap { min-width: 0; }

.brand-title {
  margin: 0;
  font-size: clamp(2rem, 9vw, 3.05rem);
  line-height: .9;
  letter-spacing: -0.06em;
  text-transform: lowercase;
  color: #c58ae9;
  text-shadow:
    0 2px 0 #62406f,
    0 5px 0 #33213c,
    0 14px 22px rgba(0,0,0,.62),
    0 0 24px rgba(197,138,233,.34);
}

.brand-eyebrow {
  margin: 0 0 8px;
  color: var(--purple-light);
  font-size: 0.72rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

.logo-mark { display: none; }

/* ---------- FOOD DATABASE / CARD UPDATE ---------- */
.food-result-card {
  width: 100%;
  border: 1px solid rgba(184, 154, 192, 0.22);
  background: linear-gradient(145deg, rgba(48, 57, 70, 0.96), rgba(27, 32, 39, 0.95));
  border-radius: 18px;
  padding: 14px;
  color: var(--cream);
  text-align: left;
}

.food-result-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
}

.food-result-card strong { display: block; font-size: 1rem; }
.food-result-card span { display: block; color: var(--muted); font-size: .86rem; margin-top: 3px; }

.rating-pill {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 999px;
  padding: 6px 10px;
  min-width: 62px;
  font-weight: 900;
  font-size: .78rem;
  text-transform: uppercase;
  letter-spacing: .04em;
  box-shadow: 0 8px 18px rgba(0,0,0,.24);
}
.rating-good { color: #dcffe1; background: rgba(44, 170, 83, .34); border: 1px solid rgba(113, 255, 147, .32); }
.rating-eh { color: #fff4bd; background: rgba(190, 143, 45, .34); border: 1px solid rgba(255, 216, 93, .32); }
.rating-ugly { color: #ffe1df; background: rgba(194, 55, 55, .34); border: 1px solid rgba(255, 102, 102, .32); }

.food-card-hero {
  display: grid;
  gap: 10px;
  padding: 16px;
  border-radius: 22px;
  background: linear-gradient(145deg, rgba(48, 57, 70, 0.96), rgba(27, 32, 39, 0.95));
  border: 1px solid rgba(184, 154, 192, 0.22);
}

.food-card-hero h2 { margin: 0; font-size: 1.35rem; line-height: 1.1; }
.food-meta { color: var(--muted); font-size: .88rem; }
.food-card-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.food-card-section { display: grid; gap: 6px; padding: 14px; border-radius: 18px; border: 1px solid rgba(184,154,192,.18); background: rgba(17,21,26,.45); }
.food-card-section h3 { margin: 0; color: var(--purple-light); }
.food-card-section p { margin: 0; color: var(--cream); line-height: 1.4; }

/* Smaller bathroom-trip counter */
.counter-control {
  grid-template-columns: 52px 64px 52px;
  justify-content: center;
  max-width: 210px;
  margin: 0 auto;
}
.counter-control button {
  width: 52px;
  height: 48px;
  padding: 0;
}
.counter-control strong {
  font-size: 1.45rem;
  min-width: 48px;
}

@media (max-width: 360px) {
  .header-mascot-wrap { width: 76px; flex-basis: 76px; }
  .header-mascot { width: 98px; }
  .brand-title { font-size: 1.9rem; }
}

@media (max-width: 360px) {
  .grid.two { grid-template-columns: 1fr; }
  h1 { font-size: 1.72rem; }
}
  </style>
</head>

function hydrateStaticIcons() {
  document.querySelectorAll('[data-nav-icon]').forEach(el => {
    const key = el.dataset.navIcon;
    el.innerHTML = icons[key] || '';
  });
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, char => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
  }[char]));
}

function normalizeText(text) {
  return String(text || '').toLowerCase().replace(/carbonated beverage/g, 'carbonated drinks');
}

function singularize(food) {
  const lower = food.toLowerCase();
  if (lower === 'carbonated drinks') return ['carbonated drinks', 'carbonated drink', 'carbonated beverage', 'carbonated beverages'];
  if (lower === 'raw vegetables') return ['raw vegetables', 'raw vegetable'];
  if (lower === 'fried foods') return ['fried foods', 'fried food'];
  return [lower];
}


function getRatingKey(value) {
  const rating = String(value || '').toLowerCase();
  if (rating.includes('green') || rating.includes('good')) return 'good';
  if (rating.includes('red') || rating.includes('avoid') || rating.includes('ugly')) return 'ugly';
  return 'eh';
}

function getRatingLabel(value) {
  const key = getRatingKey(value);
  if (key === 'good') return 'Good';
  if (key === 'ugly') return 'Ugly';
  return 'Eh';
}

function ratingPill(value) {
  const key = getRatingKey(value);
  return `<span class="rating-pill rating-${key}">${getRatingLabel(value)}</span>`;
}

function searchFoodsDatabase(query, limit = 25) {
  const q = String(query || '').trim().toLowerCase();
  if (!q) return [];
  const terms = q.split(/\s+/).filter(Boolean);
  return BBB_FOODS.map(food => {
    const haystack = `${food.id} ${food.brand} ${food.name} ${food.category} ${food.subcategory}`.toLowerCase();
    let score = 0;
    terms.forEach(term => {
      if (haystack.includes(term)) score += 1;
      if (String(food.name).toLowerCase().includes(term)) score += 2;
      if (String(food.brand).toLowerCase().includes(term)) score += 1;
    });
    if (haystack.includes(q)) score += 3;
    return { food, score };
  }).filter(item => item.score > 0)
    .sort((a, b) => b.score - a.score || a.food.name.localeCompare(b.food.name))
    .slice(0, limit)
    .map(item => item.food);
}

function findFoodById(id) {
  return BBB_FOODS.find(food => food.id === id);
}

function ratingForCurrentMode(food) {
  return state.mode === 'Flare' ? (food.flare || food.normal || 'Caution') : (food.normal || food.flare || 'Caution');
}

function watchForText(food) {
  const hay = `${food.category} ${food.subcategory} ${food.notes}`.toLowerCase();
  if (hay.includes('beverage') || hay.includes('soda') || hay.includes('juice') || hay.includes('coffee') || hay.includes('tea')) return 'Caffeine, carbonation, acidity, sugar alcohols, and high sugar may matter.';
  if (hay.includes('dairy') || hay.includes('yogurt') || hay.includes('cheese') || hay.includes('milk')) return 'Lactose, fat level, added sugars, and cultures may affect tolerance.';
  if (hay.includes('chips') || hay.includes('snack') || hay.includes('candy') || hay.includes('cookie') || hay.includes('dessert')) return 'Fat, sugar, additives, seeds, nuts, and portion size may matter.';
  if (hay.includes('vegetable') || hay.includes('fruit')) return 'Skins, seeds, acidity, roughage, and cooked versus raw preparation may matter.';
  if (hay.includes('prepared') || hay.includes('frozen')) return 'Sauces, onion, garlic, spice, fat, and full ingredient labels need review.';
  if (hay.includes('fish') || hay.includes('beef') || hay.includes('chicken') || hay.includes('pork') || hay.includes('turkey')) return 'Seasoning, skin, sauces, fat level, and preparation method may matter.';
  return 'Ingredients, portion size, preparation, and your personal history may matter.';
}

function alternativesText(food) {
  const key = getRatingKey(ratingForCurrentMode(food));
  const hay = `${food.category} ${food.subcategory}`.toLowerCase();
  if (key === 'good') return 'This may already be one of the better choices for many users, but personal tolerance still matters.';
  if (hay.includes('chips') || hay.includes('snack')) return 'Consider plain crackers, saltines, rice, or another lower-fat plain option when symptoms are active.';
  if (hay.includes('dessert') || hay.includes('candy')) return 'Consider a smaller portion, applesauce, banana, or a simpler sweet option if tolerated.';
  if (hay.includes('vegetable')) return 'Consider cooked, peeled, softer options instead of raw or high-roughage choices.';
  if (hay.includes('dairy') || hay.includes('yogurt') || hay.includes('milk')) return 'Consider lactose-free, lower-fat, plain, or smaller portions if dairy is a trigger.';
  if (hay.includes('frozen') || hay.includes('prepared')) return 'Consider a simpler homemade version with fewer sauces, spices, and additives.';
  return 'Consider a simpler, lower-fat, lower-fiber, less processed option when symptoms are active.';
}

function renderDatabaseResults(foods) {
  if (!foods.length) {
    return `<article class="result-card"><h3>No database match yet</h3><p>Try brand, product name, category, or internal ID.</p></article>`;
  }
  return `<div class="results-panel">${foods.map(food => `
    <button class="food-result-card" data-food-id="${escapeHtml(food.id)}" type="button">
      <div class="food-result-top">
        <div>
          <strong>${escapeHtml(food.brand ? food.brand + ' ' + food.name : food.name)}</strong>
          <span>${escapeHtml(food.id)} • ${escapeHtml(food.category)}${food.subcategory ? ' • ' + escapeHtml(food.subcategory) : ''}</span>
        </div>
        ${ratingPill(ratingForCurrentMode(food))}
      </div>
    </button>
  `).join('')}</div>`;
}

function foodCardScreen(food) {
  const rating = ratingForCurrentMode(food);
  return `
    <div class="screen-content">
      <button class="back-button" data-action="back-to-scan" type="button"><span>${icons.back}</span> Back to Scan</button>
      <section class="food-card-hero">
        <div class="food-result-top">
          <div>
            <div class="food-meta">${escapeHtml(food.id)} • ${escapeHtml(food.category)}${food.subcategory ? ' • ' + escapeHtml(food.subcategory) : ''}</div>
            <h2>${escapeHtml(food.brand ? food.brand + ' ' + food.name : food.name)}</h2>
          </div>
          ${ratingPill(rating)}
        </div>
        <div class="food-meta">Mode: ${escapeHtml(state.mode)} • Found: ${escapeHtml(food.found || 'Unknown')} • Photo verified: ${escapeHtml(food.photo || 'No')}</div>
        <div class="food-card-actions">
          <button class="primary-action" data-action="log-food" data-food-id="${escapeHtml(food.id)}" type="button">Log Food</button>
          <button class="secondary-action" data-action="save-food-note" type="button">Add Note</button>
        </div>
      </section>
      ${state.savedNotice ? `<p class="save-notice">${escapeHtml(state.savedNotice)}</p>` : ''}
      <section class="food-card-section"><h3>Rating Rationale</h3><p>${escapeHtml(food.notes || 'Starter rating from the v1.0 food database. Ingredient and nutrition details still need manual verification.')}</p></section>
      <section class="food-card-section"><h3>What to Watch For</h3><p>${escapeHtml(watchForText(food))}</p></section>
      <section class="food-card-section"><h3>Better Choices</h3><p>${escapeHtml(alternativesText(food))}</p></section>
      <section class="food-card-section"><h3>Verification</h3><p>Status: ${escapeHtml(food.status || 'Needs Review')}. Ingredients and nutrition will be added as the database is verified.</p></section>
      <section class="food-card-section"><h3>Your Notes</h3><p>Personal notes and community notes are reserved for the next build.</p></section>
    </div>
  `;
}

function scanFoods(text) {
  const normalized = normalizeText(text);
  const result = { good: [], caution: [], avoid: [] };

  Object.entries(FOOD_INDEX).forEach(([category, foods]) => {
    foods.forEach(food => {
      const matches = singularize(food).some(term => normalized.includes(term));
      if (matches) result[category].push(food === 'Carbonated drinks' && normalized.includes('carbonated beverage') ? 'Carbonated beverage' : food);
    });
  });

  return result;
}

function renderFoodResults(result) {
  return `
    <div class="results-panel">
      ${resultCard('Good Foods', result.good)}
      ${resultCard('Caution Foods', result.caution)}
      ${resultCard('Avoid Foods', result.avoid)}
    </div>
  `;
}

function resultCard(label, foods) {
  if (!foods || foods.length === 0) {
    return `<article class="result-card"><h3>${label}</h3><p>- none</p></article>`;
  }

  return `
    <article class="result-card">
      <h3>${label}</h3>
      <ul>${foods.map(food => `<li>${escapeHtml(food)}</li>`).join('')}</ul>
    </article>
  `;
}

function screenTitle(title, subtitle) {
  return `
    <div class="screen-title">
      <p>${escapeHtml(title)}</p>
      <h2>${escapeHtml(subtitle)}</h2>
    </div>
  `;
}

function actionCard(icon, title, text, target) {
  return `
    <button class="action-card" data-action="${target}" type="button">
      <span class="icon">${icon}</span>
      <h3>${escapeHtml(title)}</h3>
      <p>${escapeHtml(text)}</p>
    </button>
  `;
}

function listRow(icon, title, target) {
  return `
    <button class="list-row" data-action="${target}" type="button">
      <span class="icon">${icon}</span>
      <span>${escapeHtml(title)}</span>
      <strong>›</strong>
    </button>
  `;
}

function tapGroup(options, value, field) {
  return `
    <div class="tap-group">
      ${options.map(option => `
        <button class="${value === option ? 'selected' : ''}" data-set="${field}" data-value="${escapeHtml(option)}" type="button">${escapeHtml(option)}</button>

}

function logSection(title, body) {
  return `<section class="log-section"><h3>${title}</h3>${body}</section>`;
}

function homeScreen() {

  return `

        <div>
          <p>Belly Meter</p>
          <strong>Steady</strong>
          <span>${currentLabel} view — placeholder trend status.</span>
        </div>
      </div>

      <div class="segmented-control">
        ${ranges.map(item => `
          <button class="${state.range === item.id ? 'selected' : ''}" data-range="${item.id}" type="button">${item.label}</button>

      </div>

      <div class="grid two">
        ${actionCard(icons.camera, 'Scan Food', 'Check a meal, snack, label, or menu.', 'scan')}
        ${actionCard(icons.clipboard, 'Daily Log', 'Quick symptom and food note.', 'daily-log')}
        ${actionCard(icons.zap, 'Flare Help', 'Switch to stricter guidance.', 'flare')}

    </div>
  `;
}

function scanScreen() {
  const selectedFood = state.selectedFoodId ? findFoodById(state.selectedFoodId) : null;
  if (selectedFood) return foodCardScreen(selectedFood);

  const databaseResults = searchFoodsDatabase(state.foodQuery, 30);
  const combinedText = [state.menuText, state.ingredientText, state.nutritionText].join(' ');
  const textResults = searchFoodsDatabase(combinedText, 20);

  return `
    <div class="screen-content">
      ${screenTitle('Scan', "Search the Bill's Bad Belly food database.")}

      <div class="camera-placeholder">
        <span class="icon" style="font-size:3rem">${icons.camera}</span>
        <p>Camera Placeholder</p>
        <span>Camera, barcode, and OCR hooks will connect here. Search uses the 507-food database now.</span>
      </div>

      <div class="button-stack">
        <button class="primary-action" type="button">
          <span>${icons.upload}</span>
          Upload Image Placeholder
        </button>

        <button class="secondary-action" type="button">
          <span>${icons.search}</span>
          Barcode/OCR Placeholder
        </button>
      </div>

      <div class="input-card">
        <h3>Food Search</h3>
        <input class="search-box" id="foodQuery" value="${escapeHtml(state.foodQuery)}" placeholder="cheerios, chicken noodle, rice, yogurt" />
        <div style="height:10px"></div>
        <button class="primary-action full-width" data-action="food-search" type="button"><span>${icons.search}</span> Search Database</button>
      </div>

      ${state.foodQuery.trim() ? renderDatabaseResults(databaseResults) : `
        <div class="input-card">
          <h3>Database Ready</h3>
          <p>507 foods loaded. Search by brand, product, category, or internal ID.</p>
        </div>
      `}

      <div class="input-card">
        <h3>Text Analysis Prototype</h3>
        <p>Paste menu text, ingredients, or nutrition label text. Matching foods open as reusable food cards.</p>
      </div>

      <textarea class="text-input" id="menuText" placeholder="Paste menu text">${escapeHtml(state.menuText)}</textarea>
      <textarea class="text-input" id="ingredientText" placeholder="Paste ingredient list">${escapeHtml(state.ingredientText)}</textarea>
      <textarea class="text-input" id="nutritionText" placeholder="Paste nutrition label text">${escapeHtml(state.nutritionText)}</textarea>

      ${combinedText.trim() ? renderDatabaseResults(textResults) : ''}
    </div>
  `;
}

function flareScreen() {
  const goodFoods = BBB_FOODS.filter(food => getRatingKey(ratingForCurrentMode(food)) === 'good').slice(0, 6).map(food => food.brand ? food.brand + ' ' + food.name : food.name);
  const ehFoods = BBB_FOODS.filter(food => getRatingKey(ratingForCurrentMode(food)) === 'eh').slice(0, 6).map(food => food.brand ? food.brand + ' ' + food.name : food.name);
  const uglyFoods = BBB_FOODS.filter(food => getRatingKey(ratingForCurrentMode(food)) === 'ugly').slice(0, 6).map(food => food.brand ? food.brand + ' ' + food.name : food.name);

  return `
    <div class="screen-content">
      ${screenTitle('Flare', 'Normal and flare-mode food guidance.')}

      <div class="mode-toggle">
        ${['Normal', 'Flare'].map(item => `
          <button class="${state.mode === item ? 'selected' : ''}" data-mode="${item}" type="button">${item} Mode</button>
        `).join('')}
      </div>

      <div class="panel-list">
        ${foodPanel(icons.shield, 'Good', goodFoods)}
        ${foodPanel('?', 'Eh', ehFoods)}
        ${foodPanel(icons.ban, 'Ugly', uglyFoods)}
      </div>
    </div>
  `;
}

function foodPanel(icon, title, foods) {
  return `
    <article class="food-panel">
      <div class="food-panel-title">
        <span class="icon">${icon}</span>
        <h3>${escapeHtml(title)}</h3>
      </div>
      <ul>${foods.map(food => `<li>${escapeHtml(food)}</li>`).join('')}</ul>
    </article>
  `;
}

function meScreen() {
  if (state.meScreen === 'daily-log') return dailyLogScreen();
  if (state.meScreen === 'my-foods') return myFoodsScreen();
  if (state.meScreen === 'notes') return notesScreen();
  if (state.meScreen === 'history') return historyScreen();
  if (state.meScreen === 'settings') return settingsScreen();
  if (state.meScreen === 'trends') return trendsScreen();

  return `
    <div class="screen-content">
      ${screenTitle('Me', 'Personal food profile and app records.')}

      <div class="list-stack">
        ${listRow(icons.apple, 'My Foods', 'my-foods')}
        ${listRow(icons.clipboard, 'Daily Log', 'daily-log')}
        ${listRow(icons.notes, 'Notes', 'notes')}
        ${listRow(icons.history, 'History', 'history')}
        ${listRow(icons.settings, 'Settings', 'settings')}
      </div>
    </div>
  `;
}

function backButton() {
  return `<button class="back-button" data-action="me-main" type="button"><span>${icons.back}</span> Back</button>`;
}

function dailyLogScreen() {
  return `
    <div class="screen-content">

      ${screenTitle('Me → Daily Log', "10-second Crohn's check-in.")}

      ${logSection('Belly Status', tapGroup(['Good', 'Ehhh', 'Rough', 'Flare'], state.bellyStatus, 'bellyStatus'))}

      ${logSection(`Pain Level: ${state.painLevel}`, `

      ${logSection('Bathroom Trips', `
        <div class="counter-control">

          <button type="button" data-action="bathroom-plus"><span>${icons.plus}</span></button>

      ${logSection('Urgency', tapGroup(['None', 'Mild', 'Moderate', 'Severe'], state.urgency, 'urgency'))}

      ${logSection('Optional Notes', `
        <textarea class="notes-box" id="notes" placeholder="Anything worth remembering?">${escapeHtml(state.notes)}</textarea>
      `)}

      <button class="primary-action full-width" data-action="save-log" type="button">Save Log</button>
      ${state.savedNotice ? `<p class="save-notice">${escapeHtml(state.savedNotice)}</p>` : ''}

      <div class="recent-logs">
        <h3>Recent Logs</h3>

        <div class="recent-log-card">
          <strong>June 15</strong>
          <span>Status: Okay</span>
          <span>Pain: 2</span>
        </div>

        <div class="recent-log-card">
          <strong>June 14</strong>
          <span>Status: Good</span>
          <span>Pain: 1</span>
        </div>

        <div class="recent-log-card">
          <strong>June 13</strong>
          <span>Status: Rough</span>
          <span>Pain: 5</span>
        </div>
      </div>
    </div>
  `;
}

function myFoodsScreen() {
  const goodFoods = BBB_FOODS.filter(food => getRatingKey(food.normal || food.flare) === 'good').slice(0, 10).map(food => food.brand ? food.brand + ' ' + food.name : food.name);
  const ehFoods = BBB_FOODS.filter(food => getRatingKey(food.normal || food.flare) === 'eh').slice(0, 10).map(food => food.brand ? food.brand + ' ' + food.name : food.name);
  const uglyFoods = BBB_FOODS.filter(food => getRatingKey(food.flare || food.normal) === 'ugly').slice(0, 10).map(food => food.brand ? food.brand + ' ' + food.name : food.name);

  return `
    <div class="screen-content">

      ${foodPanel(icons.shield, 'Good', goodFoods)}

function notesScreen() {
  return `
    <div class="screen-content">
      ${backButton()}
      ${screenTitle('Me → Notes', 'Quick notes without a diary-style form.')}
      <div class="input-card">
        <h3>Notes Placeholder</h3>
        <p>Future quick-note capture can live here. For V0.4, Daily Log notes remain active on the Daily Log screen.</p>
      </div>

  `;
}

function historyScreen() {
  return `
    <div class="screen-content">
      ${backButton()}
      ${screenTitle('Me → History', 'Recent app records placeholder.')}
      <div class="recent-logs">
        <div class="recent-log-card"><strong>June 15</strong><span>Status: Okay</span><span>Pain: 2</span></div>
        <div class="recent-log-card"><strong>June 14</strong><span>Status: Good</span><span>Pain: 1</span></div>
        <div class="recent-log-card"><strong>June 13</strong><span>Status: Rough</span><span>Pain: 5</span></div>
      </div>
    </div>
  `;
}

function settingsScreen() {
  return `
    <div class="screen-content">
      ${backButton()}
      ${screenTitle('Me → Settings', 'App setup placeholder.')}
      <div class="input-card">
        <h3>V0.4 Settings</h3>
        <p>Single-file GitHub Pages build. No React, Vite, npm, build step, dist, or node_modules.</p>
      </div>

}

function trendsScreen() {
  return `
    <div class="screen-content">
      ${backButton()}
      ${screenTitle('Me → Trends', 'Future symptom patterns.')}
      <div class="belly-meter">
        <span class="icon">${icons.calendar}</span>
        <div>
          <p>Trend Placeholder</p>
          <strong>Steady</strong>
          <span>Today / 7 Days / 30 Days selector is active on Home. Deeper patterns come later.</span>
        </div>
      </div>
    </div>
  `;
}

function render() {
  const screen = document.getElementById('screen');

  if (state.activeTab === 'home') screen.innerHTML = homeScreen();
  if (state.activeTab === 'scan') screen.innerHTML = scanScreen();
  if (state.activeTab === 'flare') screen.innerHTML = flareScreen();
  if (state.activeTab === 'me') screen.innerHTML = meScreen();

  document.querySelectorAll('.nav-button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === state.activeTab);
  });

  bindEvents();
}

function captureInputs() {
  const foodQuery = document.getElementById('foodQuery');
  const menuText = document.getElementById('menuText');
  const ingredientText = document.getElementById('ingredientText');
  const nutritionText = document.getElementById('nutritionText');
  const notes = document.getElementById('notes');

  if (foodQuery) state.foodQuery = foodQuery.value;
  if (menuText) state.menuText = menuText.value;
  if (ingredientText) state.ingredientText = ingredientText.value;
  if (nutritionText) state.nutritionText = nutritionText.value;
  if (notes) state.notes = notes.value;
}

function bindEvents() {
  document.querySelectorAll('.nav-button').forEach(btn => {
    btn.onclick = () => {
      captureInputs();
      state.activeTab = btn.dataset.tab;
      state.meScreen = 'main';
      state.savedNotice = '';
      render();
    };
  });

  document.querySelectorAll('[data-range]').forEach(btn => {
    btn.onclick = () => {
      state.range = btn.dataset.range;
      render();
    };
  });

  document.querySelectorAll('[data-mode]').forEach(btn => {
    btn.onclick = () => {
      state.mode = btn.dataset.mode;
      render();
    };
  });

  document.querySelectorAll('[data-set]').forEach(btn => {
    btn.onclick = () => {
      state[btn.dataset.set] = btn.dataset.value;
      render();
    };
  });

  const pain = document.getElementById('painLevel');
  if (pain) {
    pain.oninput = event => {
      state.painLevel = Number(event.target.value);
      render();
    };
  }

  ['foodQuery', 'menuText', 'ingredientText', 'nutritionText', 'notes'].forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      el.oninput = () => {
        captureInputs();
        if (id !== 'notes') render();
      };
    }
  });

  document.querySelectorAll('[data-action]').forEach(btn => {
    btn.onclick = () => {
      captureInputs();
      const action = btn.dataset.action;

      if (action === 'scan') { state.activeTab = 'scan'; state.selectedFoodId = ''; }
      if (action === 'flare') state.activeTab = 'flare';
      if (action === 'daily-log') { state.activeTab = 'me'; state.meScreen = 'daily-log'; }
      if (action === 'trends') { state.activeTab = 'me'; state.meScreen = 'trends'; }
      if (action === 'my-foods') state.meScreen = 'my-foods';
      if (action === 'notes') state.meScreen = 'notes';
      if (action === 'history') state.meScreen = 'history';
      if (action === 'settings') state.meScreen = 'settings';
      if (action === 'me-main') { state.meScreen = 'main'; state.savedNotice = ''; }
      if (action === 'bathroom-minus') state.bathroomTrips = Math.max(0, state.bathroomTrips - 1);
      if (action === 'bathroom-plus') state.bathroomTrips += 1;
      if (action === 'save-log') state.savedNotice = 'Log saved locally for this session.';
      if (action === 'food-search') { state.selectedFoodId = ''; }
      if (action === 'back-to-scan') { state.selectedFoodId = ''; }
      if (btn.dataset.foodId) { state.selectedFoodId = btn.dataset.foodId; state.activeTab = 'scan'; }
      if (action === 'log-food') {
        const food = findFoodById(btn.dataset.foodId);
        if (food) {
          state.foodLogs.unshift({ id: food.id, name: food.name, brand: food.brand, rating: getRatingLabel(ratingForCurrentMode(food)), mode: state.mode, timestamp: new Date().toISOString() });
          state.foodLogs = state.foodLogs.slice(0, 50);
          localStorage.setItem('bbbFoodLogs', JSON.stringify(state.foodLogs));
          state.savedNotice = 'Food logged locally.';
        }
      }
      if (action === 'save-food-note') { state.savedNotice = 'Personal food notes come next.'; }

      render();
    };
  });
}

render();
  </script>
