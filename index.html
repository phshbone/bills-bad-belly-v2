<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>bill's bad belly</title>
  <style>
@import url("https://fonts.googleapis.com/css2?family=Baumans&display=swap");
:root {
  --display-font: "ITC Bauhaus", "Bauhaus", "Bauhaus 93", "Baumans", "Arial Rounded MT Bold", "Trebuchet MS", sans-serif;
  --body-font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --gunmetal: #1b2027;
  --gunmetal-soft: #242b34;
  --gunmetal-light: #303946;
  --purple: #7d5f86;
  --purple-light: #b89ac0;
  --cream: #f3edf4;
  --muted: #b8b0ba;
  --shadow: rgba(0, 0, 0, 0.35);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  background: radial-gradient(circle at top, #303946 0%, var(--gunmetal) 45%, #11151a 100%);
  color: var(--cream);
  font-family: var(--body-font);
}

button, input, textarea { font: inherit; }

button {
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}


/* v1.0.3 foundation typography pass */
h1, h2, h3,
.logo-wordmark,
.screen-title h2,
.card-title,
.action-card h3,
.belly-meter p,
.nav-button,
.primary-action,
.secondary-action,
.compact-action,
.rating-pill,
.mode-pill,
.tap-choice,
.info-dot,
.eyebrow {
  font-family: var(--display-font);
  letter-spacing: 0.02em;
}

button,
.nav-button,
.primary-action,
.secondary-action,
.compact-action,
.tap-choice,
.rating-pill,
.mode-pill {
  text-transform: lowercase;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
}

button,
[role="button"],
.counter-btn,
.tap-choice,
.nav-button,
.mode-pill {
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
}

.logo-wordmark,
.logo-wordmark *,
.app-title,
.app-title *,
.brand-lowercase {
  text-transform: lowercase;
}


.app-shell {
  width: min(100%, 430px);
  min-height: 100vh;
  margin: 0 auto;
  padding: 22px 16px calc(172px + env(safe-area-inset-bottom, 0px));
  position: relative;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 18px;
}

.eyebrow {
  margin: 0 0 4px;
  color: var(--purple-light);
  font-size: 0.78rem;
  letter-spacing: 0.14em;
  text-transform: none;
}

h1 {
  margin: 0;
  font-size: 2rem;
  line-height: 1;
  letter-spacing: -0.04em;
  text-transform: lowercase;
}

.logo-mark {
  width: 54px;
  height: 54px;
  border-radius: 18px;
  display: grid;
  place-items: center;
  background: linear-gradient(145deg, var(--purple), #513d59);
  box-shadow: 0 14px 30px var(--shadow), inset 0 1px 0 rgba(255,255,255,.2);
  color: white;
  font-weight: 800;
  letter-spacing: -0.08em;
  text-transform: lowercase;
}

.screen-card {
  min-height: calc(100vh - 142px);
  background: rgba(36, 43, 52, 0.78);
  border: 1px solid rgba(184, 154, 192, 0.25);
  border-radius: 28px;
  padding: 18px;
  box-shadow: 0 20px 50px var(--shadow);
  backdrop-filter: blur(12px);
}

.screen-content { display: grid; gap: 16px; }

.screen-title p {
  margin: 0 0 6px;
  color: var(--purple-light);
  font-weight: 700;
}

.screen-title h2 {
  margin: 0;
  font-size: 1.35rem;
  line-height: 1.2;
  letter-spacing: -0.03em;
}

.belly-meter,
.camera-placeholder,
.action-card,
.list-row,
.blueprint-box,
.result-card,
.food-panel,
.input-card {
  border: 1px solid rgba(184, 154, 192, 0.22);
  background: linear-gradient(145deg, rgba(48, 57, 70, 0.96), rgba(27, 32, 39, 0.95));
  border-radius: 22px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
}

.belly-meter {
  display: flex;
  gap: 16px;
  align-items: center;
  padding: 18px;
}

.icon { color: var(--purple-light); font-size: 1.55rem; line-height: 1; display: inline-grid; place-items: center; }
.icon svg { width: 24px; height: 24px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.belly-meter .icon svg { width: 42px; height: 42px; }
.camera-placeholder .icon svg { width: 54px; height: 54px; }
.nav-button .icon svg { width: 22px; height: 22px; }

.belly-meter p,
.belly-meter strong,
.belly-meter span { display: block; }
.belly-meter p { margin: 0 0 3px; color: var(--muted); }
.belly-meter strong { font-size: 1.8rem; line-height: 1; }
.belly-meter span { margin-top: 6px; color: var(--muted); font-size: .9rem; }

.segmented-control,
.mode-toggle {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 8px;
  border-radius: 18px;
  background: rgba(17, 21, 26, 0.5);
}

.mode-toggle { grid-template-columns: repeat(2, 1fr); }

.segmented-control button,
.mode-toggle button {
  border: 0;
  border-radius: 13px;
  padding: 10px 8px;
  color: var(--cream);
  background: transparent;
}

.segmented-control button.selected,
.mode-toggle button.selected {
  background: var(--purple);
  color: white;
  box-shadow: 0 10px 24px rgba(125,95,134,.28);
}

.grid.two {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

.action-card {
  padding: 16px;
  min-height: 132px;
  color: var(--cream);
  text-align: left;
}
.action-card h3 { margin: 12px 0 6px; font-size: 1rem; }
.action-card p { margin: 0; color: var(--muted); font-size: .88rem; line-height: 1.35; }

.camera-placeholder {
  display: grid;
  place-items: center;
  min-height: 230px;
  padding: 24px;
  text-align: center;
  border-style: dashed;
}
.camera-placeholder p { margin: 12px 0 4px; font-weight: 800; }
.camera-placeholder span { color: var(--muted); }

.list-stack { display: grid; gap: 10px; }
.list-row {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px;
  color: var(--cream);
  text-align: left;
}
.list-row strong { margin-left: auto; color: var(--purple-light); font-size: 1.4rem; }

.blueprint-box { padding: 14px 16px; }
.blueprint-box summary { cursor: pointer; color: var(--purple-light); font-weight: 700; }
.blueprint-box pre { white-space: pre-wrap; color: var(--muted); line-height: 1.4; font-size: .82rem; }

.bottom-nav {
  position: fixed;
  left: 50%;
  bottom: calc(12px + env(safe-area-inset-bottom, 0px));
  transform: translate3d(-50%, 0, 0);
  -webkit-transform: translate3d(-50%, 0, 0);
  width: min(calc(100% - 24px), 430px);
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  padding: 10px;
  border: 1px solid rgba(184,154,192,.28);
  border-radius: 24px;
  background: rgba(27, 32, 39, 0.94);
  box-shadow: 0 18px 50px rgba(0,0,0,.55);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  z-index: 9999;
  will-change: transform;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  contain: layout paint;
}

.nav-button {
  display: grid;
  place-items: center;
  gap: 4px;
  border: 0;
  border-radius: 17px;
  padding: 10px 4px;
  background: transparent;
  color: var(--muted);
}

.nav-button span { font-size: .74rem; font-weight: 700; }
.nav-button.active {
  color: white;
  background: linear-gradient(145deg, var(--purple), #5e4867);
}

/* ---------- DAILY LOG ---------- */

.back-button {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  width: fit-content;
  border: 1px solid rgba(184, 154, 192, 0.22);
  border-radius: 16px;
  padding: 10px 14px;
  background: linear-gradient(145deg, rgba(48, 57, 70, 0.96), rgba(27, 32, 39, 0.95));
  color: var(--cream);
}

.log-section {
  display: grid;
  gap: 12px;
  padding: 16px;
  border-radius: 22px;
  border: 1px solid rgba(184, 154, 192, 0.22);
  background: linear-gradient(145deg, rgba(48, 57, 70, 0.96), rgba(27, 32, 39, 0.95));
}

.log-section h3 {
  margin: 0;
  color: var(--purple-light);
}

.tap-group {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.tap-group button {
  border: 0;
  border-radius: 14px;
  padding: 12px;
  background: rgba(17, 21, 26, 0.65);
  color: var(--cream);
}

.tap-group button.selected {
  background: var(--purple);
  color: white;
  box-shadow: 0 10px 24px rgba(125, 95, 134, 0.28);
}

.counter-control {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 12px;
}

.counter-control button {
  border: 0;
  border-radius: 16px;
  padding: 14px;
  background: rgba(17, 21, 26, 0.65);
  color: var(--cream);
}

.counter-control strong {
  font-size: 2rem;
  text-align: center;
  min-width: 48px;
}

.pain-slider { width: 100%; }

.notes-box,
.text-input,
.search-box {
  width: 100%;
  border: 1px solid rgba(184, 154, 192, 0.22);
  border-radius: 16px;
  padding: 12px;
  background: rgba(17, 21, 26, 0.5);
  color: var(--cream);
}

.notes-box {
  min-height: 90px;
  resize: vertical;
}

.text-input {
  min-height: 96px;
  resize: vertical;
}

.notes-box::placeholder,
.text-input::placeholder,
.search-box::placeholder {
  color: var(--muted);
}

.full-width { width: 100%; }

.recent-logs { display: grid; gap: 10px; }

.recent-log-card {
  display: grid;
  gap: 4px;
  padding: 14px;
  border-radius: 18px;
  border: 1px solid rgba(184, 154, 192, 0.18);
  background: rgba(17, 21, 26, 0.45);
}

.button-stack {
  display: grid;
  gap: 10px;
}

.primary-action,
.secondary-action {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 48px;
  border-radius: 16px;
  padding: 12px 16px;
  color: var(--cream);
}

.primary-action {
  border: 0;
  background: linear-gradient(145deg, var(--purple), #5e4867);
  box-shadow: 0 10px 24px rgba(125,95,134,.28);
}

.secondary-action {
  border: 1px solid rgba(184,154,192,.28);
  background: rgba(17,21,26,.5);
}

.results-panel,
.panel-list {
  display: grid;
  gap: 10px;
}

.result-card,
.food-panel,
.input-card {
  padding: 14px;
}

.result-card h3,
.food-panel h3,
.input-card h3 {
  margin: 0 0 8px;
  color: var(--purple-light);
}

.result-card p,
.input-card p {
  margin: 0;
  color: var(--muted);
  line-height: 1.4;
}

.result-card ul,
.food-panel ul {
  margin: 6px 0 0;
  padding-left: 20px;
  color: var(--cream);
}

.food-panel-title {
  display: flex;
  align-items: center;
  gap: 10px;
}

.save-notice {
  margin: 0;
  color: var(--purple-light);
  font-weight: 700;
}

.small-muted {
  color: var(--muted);
  font-size: .88rem;
}



/* ---------- BRANDED HEADER UPDATE ---------- */
.topbar {
  align-items: center;
  justify-content: flex-start;
  min-height: 92px;
  margin-bottom: 14px;
  position: relative;
}

.header-mascot-wrap {
  width: 88px;
  height: 92px;
  flex: 0 0 88px;
  overflow: hidden;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  filter: drop-shadow(0 12px 16px rgba(0,0,0,.42));
}

.header-mascot {
  width: 112px;
  height: auto;
  transform: translateY(8px);
}

.brand-title-wrap { min-width: 0; }

.brand-title {
  margin: 0;
  font-size: clamp(2rem, 9vw, 3.05rem);
  line-height: .9;
  letter-spacing: -0.06em;
  text-transform: lowercase;
  color: #c58ae9;
  text-shadow:
    0 2px 0 #62406f,
    0 5px 0 #33213c,
    0 14px 22px rgba(0,0,0,.62),
    0 0 24px rgba(197,138,233,.34);
}

.brand-eyebrow {
  margin: 0 0 8px;
  color: var(--purple-light);
  font-size: 0.72rem;
  letter-spacing: 0.14em;
  text-transform: none;
}

.logo-mark { display: none; }

/* ---------- FOOD DATABASE / CARD UPDATE ---------- */
.food-result-card {
  width: 100%;
  border: 1px solid rgba(184, 154, 192, 0.22);
  background: linear-gradient(145deg, rgba(48, 57, 70, 0.96), rgba(27, 32, 39, 0.95));
  border-radius: 18px;
  padding: 14px;
  color: var(--cream);
  text-align: left;
}

.food-result-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
}

.food-result-card strong { display: block; font-size: 1rem; }
.food-result-card span { display: block; color: var(--muted); font-size: .86rem; margin-top: 3px; }

.rating-pill {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 999px;
  padding: 6px 10px;
  min-width: 62px;
  font-weight: 900;
  font-size: .78rem;
  text-transform: none;
  letter-spacing: .04em;
  box-shadow: 0 8px 18px rgba(0,0,0,.24);
}
.rating-good { color: #dcffe1; background: rgba(44, 170, 83, .34); border: 1px solid rgba(113, 255, 147, .32); }
.rating-ehh { color: #fff4bd; background: rgba(190, 143, 45, .34); border: 1px solid rgba(255, 216, 93, .32); }
.rating-ugly { color: #ffe1df; background: rgba(194, 55, 55, .34); border: 1px solid rgba(255, 102, 102, .32); }

.food-card-hero {
  display: grid;
  gap: 10px;
  padding: 16px;
  border-radius: 22px;
  background: linear-gradient(145deg, rgba(48, 57, 70, 0.96), rgba(27, 32, 39, 0.95));
  border: 1px solid rgba(184, 154, 192, 0.22);
}

.food-card-hero h2 { margin: 0; font-size: 1.35rem; line-height: 1.1; }
.food-meta { color: var(--muted); font-size: .88rem; }
.food-card-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.food-card-section { display: grid; gap: 6px; padding: 14px; border-radius: 18px; border: 1px solid rgba(184,154,192,.18); background: rgba(17,21,26,.45); }
.food-card-section h3 { margin: 0; color: var(--purple-light); }
.food-card-section p { margin: 0; color: var(--cream); line-height: 1.4; }

.results-summary {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  color: var(--muted);
  font-size: .9rem;
}

.results-summary strong { color: var(--purple-light); }

.results-heading {
  margin: 4px 0 -2px;
  color: var(--purple-light);
  font-size: .95rem;
  font-weight: 900;
  letter-spacing: .02em;
  text-transform: none;
}

.category-group {
  border: 1px solid rgba(184, 154, 192, 0.22);
  background: linear-gradient(145deg, rgba(48, 57, 70, 0.88), rgba(27, 32, 39, 0.9));
  border-radius: 18px;
  overflow: hidden;
}

.category-group summary {
  min-height: 54px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 14px;
  cursor: pointer;
  color: var(--cream);
  font-weight: 900;
}

.category-group summary span {
  color: var(--purple-light);
  font-weight: 800;
  font-size: .86rem;
}

.category-group-body {
  display: grid;
  gap: 10px;
  padding: 0 12px 12px;
}

.back-to-results {
  position: sticky;
  bottom: 104px;
  z-index: 5;
  width: 100%;
  border: 1px solid rgba(184,154,192,.34);
  border-radius: 16px;
  padding: 12px 14px;
  color: var(--cream);
  background: linear-gradient(145deg, rgba(125,95,134,.98), rgba(94,72,103,.98));
  box-shadow: 0 12px 30px rgba(0,0,0,.38);
}


/* Smaller bathroom-trip counter */
.counter-control {
  grid-template-columns: 52px 64px 52px;
  justify-content: center;
  max-width: 210px;
  margin: 0 auto;
}
.counter-control button {
  width: 52px;
  height: 48px;
  padding: 0;
}
.counter-control strong {
  font-size: 1.45rem;
  min-width: 48px;
}

@media (max-width: 360px) {
  .header-mascot-wrap { width: 76px; flex-basis: 76px; }
  .header-mascot { width: 98px; }
  .brand-title { font-size: 1.9rem; }
}

@media (max-width: 360px) {
  .grid.two { grid-template-columns: 1fr; }
  h1 { font-size: 1.72rem; }
}
  

/* ---------- V1.1 HEADER RESTORE / FIXES ---------- */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 18px;
  min-height: 76px;
  position: relative;
}
.header-mascot-wrap {
  width: 58px;
  height: 76px;
  flex: 0 0 58px;
  overflow: hidden;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  filter: drop-shadow(0 10px 12px rgba(0,0,0,.42));
}
.header-mascot {
  width: 76px;
  height: auto;
  transform: translateY(5px);
  image-rendering: auto;
}
.brand-title-wrap { flex: 1; min-width: 0; }
.brand-title-wrap .eyebrow {
  margin: 0 0 4px;
  color: var(--purple-light);
  font-size: 0.78rem;
  letter-spacing: 0.14em;
  text-transform: none;
}
.brand-title-wrap h1 {
  margin: 0;
  font-size: 2rem;
  line-height: 1;
  letter-spacing: -0.04em;
  text-transform: lowercase;
  color: #c58ae9;
  text-shadow:
    0 1px 0 #6f4b7b,
    0 3px 0 #3a2742,
    0 10px 18px rgba(0,0,0,.58),
    0 0 18px rgba(197,138,233,.24);
}
.logo-mark { display: grid !important; flex: 0 0 54px; }

/* Keep bathroom trip control compact. */
.counter-control {
  grid-template-columns: 48px 54px 48px;
  justify-content: center;
  max-width: 176px;
  margin: 0 auto;
}
.counter-control button {
  width: 48px;
  height: 44px;
  padding: 0;
}
.counter-control strong {
  font-size: 1.32rem;
  min-width: 42px;
}

@media (max-width: 360px) {
  .header-mascot-wrap { width: 48px; flex-basis: 48px; }
  .header-mascot { width: 66px; }
  .brand-title-wrap h1 { font-size: 1.62rem; }
  .logo-mark { width: 48px; height: 48px; flex-basis: 48px; }
}


/* ---------- BUILD 7 SEARCH OVERHAUL ---------- */
.search-tools {
  display: grid;
  gap: 10px;
}
.search-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
  align-items: center;
}
.clear-search {
  min-height: 46px;
  border: 1px solid rgba(184,154,192,.28);
  border-radius: 14px;
  padding: 0 12px;
  background: rgba(17,21,26,.55);
  color: var(--cream);
  font-weight: 800;
}
.search-hint {
  margin: 0;
  color: var(--muted);
  font-size: .86rem;
  line-height: 1.35;
}
.search-chip-row {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 2px;
  -webkit-overflow-scrolling: touch;
}
.search-chip {
  flex: 0 0 auto;
  border: 1px solid rgba(184,154,192,.26);
  border-radius: 999px;
  padding: 8px 10px;
  background: rgba(17,21,26,.55);
  color: var(--cream);
  font-size: .84rem;
  font-weight: 800;
}
.advanced-scan summary {
  cursor: pointer;
  color: var(--purple-light);
  font-weight: 900;
}
.advanced-scan-body {
  display: grid;
  gap: 12px;
  margin-top: 12px;
}
.result-meta-line {
  margin-top: 8px;
  color: var(--muted);
  font-size: .78rem;
  line-height: 1.3;
}
.match-reason {
  color: var(--purple-light);
  font-weight: 800;
}
.compact-results-note {
  margin: 0;
  color: var(--muted);
  font-size: .84rem;
  line-height: 1.35;
}
@media (max-width: 360px) {
  .search-row { grid-template-columns: 1fr; }
  .clear-search { width: 100%; }
}


/* ---------- BUILD 7.1 CARD ACTIONS + FLARE STATE ---------- */
.food-result-card {
  display: grid;
  gap: 12px;
}

.food-result-actions {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}

.compact-action {
  min-height: 40px;
  padding: 8px 10px;
  border-radius: 13px;
  font-size: .84rem;
  font-weight: 800;
}

.flare-active .screen-card {
  border-color: rgba(197, 138, 233, .58);
  background:

.info-toast {

function hydrateStaticIcons() {
  document.querySelectorAll('[data-nav-icon]').forEach(el => {
    const key = el.dataset.navIcon;
    el.innerHTML = icons[key] || '';
  });
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, char => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
  }[char]));
}

function normalizeText(text) {
  return String(text || '').toLowerCase().replace(/carbonated beverage/g, 'carbonated drinks');
}

function singularize(food) {
  const lower = food.toLowerCase();
  if (lower === 'carbonated drinks') return ['carbonated drinks', 'carbonated drink', 'carbonated beverage', 'carbonated beverages'];
  if (lower === 'raw vegetables') return ['raw vegetables', 'raw vegetable'];
  if (lower === 'fried foods') return ['fried foods', 'fried food'];
  return [lower];
}


function getRatingKey(value) {
  const rating = String(value || '').toLowerCase();
  if (rating.includes('green') || rating.includes('good')) return 'good';
  if (rating.includes('red') || rating.includes('avoid') || rating.includes('ugly')) return 'ugly';
  return 'ehh';
}

function getRatingLabel(rating) {
  if (rating === 'Green') return 'good';
  if (rating === 'Red') return 'ugly';
  return 'ehh';
}

function ratingPill(value) {
  const key = getRatingKey(value);
  const label = getRatingLabel(value);
  return `<button class="rating-pill rating-${key}" data-action="rating-info" data-rating="${key}" type="button" aria-label="${label} rating explanation">${label}</button>`;
}

function compactText(value) {
  return String(value || '').toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim();
}

function foodSearchText(food) {
  const base = `${food.id} ${food.brand} ${food.name} ${food.category} ${food.subcategory} ${food.notes}`;
  const nameCat = `${food.name} ${food.category} ${food.subcategory}`.toLowerCase();
  const aliases = [];
  if (nameCat.includes('pasta sauce') || nameCat.includes('marinara')) aliases.push('tomato sauce marinara red sauce');
  if (nameCat.includes('tomato') || nameCat.includes('tomatoes')) aliases.push('tomato tomatoes');
  if (nameCat.includes('chicken broth') || nameCat.includes('bone broth')) aliases.push('broth stock soup');
  return compactText(`${base} ${aliases.join(' ')}`);
}

function scoreFoodMatch(food, query) {
  const q = compactText(query);
  if (!q) return { food, score: 0, reason: '' };

  const genericTerms = new Set(['a','an','and','the','of','with','food','foods','drink','drinks','meal','meals','plain','fresh','frozen','wegmans','brand']);
  const softTerms = new Set(['soup','snack','snacks','juice','water','zero','sugar','cheese','chicken','beef','rice','milk']);
  const terms = q.split(/\s+/).filter(Boolean);
  const specificTerms = terms.filter(term => !genericTerms.has(term) && !softTerms.has(term));
  const usefulTerms = specificTerms.length ? specificTerms : terms.filter(term => !genericTerms.has(term));

  const id = compactText(food.id);
  const name = compactText(food.name);
  const brand = compactText(food.brand);
  const category = compactText(food.category);
  const subcategory = compactText(food.subcategory);
  const notes = compactText(food.notes);
  const fullName = compactText(`${food.brand} ${food.name}`);
  const text = foodSearchText(food);

  const nameWords = new Set(name.split(/\s+/).filter(Boolean));
  const brandWords = new Set(brand.split(/\s+/).filter(Boolean));
  const categoryWords = new Set(category.split(/\s+/).filter(Boolean));
  const subcategoryWords = new Set(subcategory.split(/\s+/).filter(Boolean));

  const matchedTerms = terms.filter(term => text.includes(term));
  const matchedUseful = usefulTerms.filter(term => text.includes(term));
  const exactPhrase = name === q || fullName === q || id === q;
  const exactCategory = category === q || subcategory === q;
  const categoryWordMatch = terms.length === 1 && (categoryWords.has(q) || subcategoryWords.has(q));
  const primaryWordMatch = terms.length === 1 && (nameWords.has(q) || brandWords.has(q));
  const phraseInPrimary = name.includes(q) || fullName.includes(q);
  const phraseInSecondary = category.includes(q) || subcategory.includes(q);
  const phraseInText = text.includes(q);

  if (!matchedTerms.length && !phraseInText) return { food, score: 0, reason: '' };

  // For multi-word intent searches, do not let broad words pull in unrelated products.
  // Example: "chicken soup" should not rank every chicken product above actual soup/broth-like matches.
  if (terms.length > 1 && usefulTerms.length && !matchedUseful.length && !phraseInText) {
    return { food, score: 0, reason: '' };
  }

  let score = 0;
  let reason = 'related match';

  if (id === q) { score += 1600; reason = 'exact ID'; }
  if (exactPhrase) { score += 1400; reason = 'exact food match'; }
  if (exactCategory) { score += 1250; reason = 'exact category match'; }
  if (categoryWordMatch) { score += 1050; reason = 'category match'; }
  if (name.startsWith(q) || fullName.startsWith(q)) { score += 1080; reason = 'starts with your search'; }
  if (phraseInPrimary) { score += 900; reason = 'phrase in food name'; }
  if (phraseInSecondary) { score += 620; reason = 'phrase in category'; }
  if (phraseInText) score += 420;

  const allTermsInName = terms.every(term => name.includes(term));
  const allTermsInFullName = terms.every(term => fullName.includes(term));
  const allTermsInCategory = terms.every(term => `${category} ${subcategory}`.includes(term));
  const allUsefulInPrimary = usefulTerms.length && usefulTerms.every(term => `${name} ${fullName}`.includes(term));

  if (allTermsInName) { score += 680; reason = 'all words in food name'; }
  if (allTermsInFullName) { score += 620; reason = 'all words in brand/name'; }
  if (allUsefulInPrimary) score += 420;
  if (allTermsInCategory) { score += 460; reason = 'category match'; }

  terms.forEach((term, index) => {
    const orderBonus = Math.max(0, 40 - index * 6);
    if (name === term) score += 380;
    if (name.startsWith(term)) score += 170 + orderBonus;
    if (nameWords.has(term)) score += 145;
    else if (name.includes(term)) score += 78;
    if (brandWords.has(term)) score += 70;
    else if (brand.includes(term)) score += 38;
    if (subcategoryWords.has(term)) score += 82;
    else if (subcategory.includes(term)) score += 38;
    if (categoryWords.has(term)) score += 96;
    else if (category.includes(term)) score += 30;
    if (id.includes(term)) score += 24;
    if (notes.includes(term)) score += 10;
  });

  // Tomato sauce / ingredient-intent polish: exact preparation beats loose ingredient matches.
  if (terms.includes('tomato') && terms.includes('sauce')) {
    const primary = `${name} ${subcategory} ${category}`;
    if (primary.includes('tomato') && primary.includes('sauce')) { score += 520; reason = 'tomato sauce match'; }
    else if (nameWords.has('tomato') || nameWords.has('tomatoes')) score -= 260;
  }

  // Soft demotions keep broad matches from flooding the top.
  if (terms.length > 1 && matchedTerms.length === 1) score -= 220;
  if (usefulTerms.length && matchedUseful.length < usefulTerms.length && !phraseInPrimary) score -= 120;
  if (!phraseInPrimary && !allTermsInName && score < 500) score -= 70;
  if (terms.length === 1 && phraseInPrimary && !primaryWordMatch && !categoryWordMatch) score -= 360;
  if (terms.length === 1 && categoryWordMatch && !primaryWordMatch) score += 220;

  return { food, score, reason };
}

function searchFoodsDatabase(query, limit = 80) {
  const q = compactText(query);
  if (!q) return [];

  return BBB_FOODS
    .map(food => scoreFoodMatch(food, q))
    .filter(item => item.score > 0)
    .sort((a, b) => b.score - a.score || a.food.name.localeCompare(b.food.name))
    .slice(0, limit);
}

function ratingForCurrentMode(food) {
  const hay = `${food.id} ${food.brand} ${food.name} ${food.category} ${food.subcategory}`.toLowerCase();

  // Early MVP correction layer: keep database values, but correct obvious plain/base proteins
  // that imported with blank ratings or overly cautious defaults.
  const isPlainBaseProtein =
    hay.includes('bone broth') ||
    hay.includes('fresh chicken') ||
    hay.includes('chicken breast') ||
    hay.includes('chicken breasts') ||
    hay.includes('chicken drumsticks') ||
    hay.includes('chicken thighs') ||
    hay.includes('whole chicken') ||
    hay.includes('ground chicken') ||
    hay.includes('ground turkey') ||
    hay.includes('ground beef') ||
    hay.includes('fresh fish') ||
    hay.includes('fresh salmon') ||
    hay.includes('fresh cod') ||
    hay.includes('plain beef patties');

  const isProcessedOrSauced =
    hay.includes('nugget') || hay.includes('sausage') || hay.includes('pot pie') ||
    hay.includes('parmesan') || hay.includes('fettuccine') || hay.includes('bowl') ||
    hay.includes('frozen entree') || hay.includes('prepared');

  if (isPlainBaseProtein && !isProcessedOrSauced) {
    return state.mode === 'Flare' ? 'Caution' : 'Green';
  }

  return state.mode === 'Flare' ? (food.flare || food.normal || 'Caution') : (food.normal || food.flare || 'Caution');
}

function watchForText(food) {
  const hay = `${food.category} ${food.subcategory} ${food.notes}`.toLowerCase();
  if (hay.includes('beverage') || hay.includes('soda') || hay.includes('juice') || hay.includes('coffee') || hay.includes('tea')) return 'Caffeine, carbonation, acidity, sugar alcohols, and high sugar may matter.';
  if (hay.includes('dairy') || hay.includes('yogurt') || hay.includes('cheese') || hay.includes('milk')) return 'Lactose, fat level, added sugars, and cultures may affect tolerance.';
  if (hay.includes('chips') || hay.includes('snack') || hay.includes('candy') || hay.includes('cookie') || hay.includes('dessert')) return 'Fat, sugar, additives, seeds, nuts, and portion size may matter.';
  if (hay.includes('vegetable') || hay.includes('fruit')) return 'Skins, seeds, acidity, roughage, and cooked versus raw preparation may matter.';
  if (hay.includes('prepared') || hay.includes('frozen')) return 'Sauces, onion, garlic, spice, fat, and full ingredient labels need review.';
  if (hay.includes('fish') || hay.includes('beef') || hay.includes('chicken') || hay.includes('pork') || hay.includes('turkey')) return 'Seasoning, skin, sauces, fat level, and preparation method may matter.';
  return 'Ingredients, portion size, preparation, and your personal history may matter.';
}

function alternativesText(food) {
  const key = getRatingKey(ratingForCurrentMode(food));
  const hay = `${food.category} ${food.subcategory}`.toLowerCase();
  if (key === 'good') return 'This may already be one of the better choices for many users, but personal tolerance still matters.';
  if (hay.includes('chips') || hay.includes('snack')) return 'Consider plain crackers, saltines, rice, or another lower-fat plain option when symptoms are active.';
  if (hay.includes('dessert') || hay.includes('candy')) return 'Consider a smaller portion, applesauce, banana, or a simpler sweet option if tolerated.';
  if (hay.includes('vegetable')) return 'Consider cooked, peeled, softer options instead of raw or high-roughage choices.';
  if (hay.includes('dairy') || hay.includes('yogurt') || hay.includes('milk')) return 'Consider lactose-free, lower-fat, plain, or smaller portions if dairy is a trigger.';
  if (hay.includes('frozen') || hay.includes('prepared')) return 'Consider a simpler homemade version with fewer sauces, spices, and additives.';
  return 'Consider a simpler, lower-fat, lower-fiber, less processed option when symptoms are active.';
}

    const key = item.food.category || 'Other';
    if (!acc[key]) acc[key] = [];
    acc[key].push(item);
    return acc;

  const categorySections = Object.entries(grouped)
    .sort((a, b) => a[0].localeCompare(b[0]))
    .map(([category, groupItems]) => `
      <details class="category-group">
        <summary>${escapeHtml(category)} <span>${groupItems.length} result${groupItems.length === 1 ? '' : 's'} +</span></summary>

}

function scanFoods(text) {
  const normalized = normalizeText(text);
  const result = { good: [], caution: [], avoid: [] };

  Object.entries(FOOD_INDEX).forEach(([category, foods]) => {
    foods.forEach(food => {
      const matches = singularize(food).some(term => normalized.includes(term));
      if (matches) result[category].push(food === 'Carbonated drinks' && normalized.includes('carbonated beverage') ? 'Carbonated beverage' : food);
    });
  });

  return result;
}

function setMode(nextMode) {
  if (!nextMode || state.mode === nextMode) {
    state.modeInfoOpen = false;
    render();
    return;
  }
  state.mode = nextMode;
  state.modeInfoOpen = false;
  document.body.classList.add('mode-changing');
  render();
  window.setTimeout(() => document.body.classList.remove('mode-changing'), 320);
}



let cameraStream = null;
let cameraFacingMode = 'environment';
let cameraOpeningFromScanTab = false;

function setCameraStatus(message) {
  const status = document.getElementById('cameraStatus');
  if (status) status.textContent = message;
}

function showCameraError(message) {
  const box = document.getElementById('cameraErrorBox');
  const text = document.getElementById('cameraErrorText');
  if (text) text.textContent = message;
  if (box) box.classList.add('active');
  setCameraStatus('camera stopped');
}

function hideCameraError() {
  document.getElementById('cameraErrorBox')?.classList.remove('active');
}

async function openCameraOverlay() {
  const overlay = document.getElementById('cameraOverlay');
  const video = document.getElementById('cameraVideo');
  if (!overlay || !video) return;

  hideCameraError();
  overlay.classList.add('active');
  overlay.setAttribute('aria-hidden', 'false');
  setCameraStatus('starting camera…');

  try {
    stopCameraStream();
    const constraints = {
      video: {
        facingMode: { ideal: cameraFacingMode },
        width: { ideal: 1920 },
        height: { ideal: 1080 }
      },
      audio: false
    };
    cameraStream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = cameraStream;
    await video.play();
    setCameraStatus('ready');
  } catch (error) {
    const needsHttps = location.protocol !== 'https:' && location.hostname !== 'localhost';
    const message = needsHttps
      ? 'Camera requires HTTPS. Upload this build to GitHub Pages, then test from Safari.'
      : 'Camera permission was blocked or unavailable. Check browser permission and try again.';
    showCameraError(message);
  }
}

function stopCameraStream() {
  if (cameraStream) {
    cameraStream.getTracks().forEach(track => track.stop());
    cameraStream = null;
  }
}

function closeCameraOverlay() {
  stopCameraStream();
  const overlay = document.getElementById('cameraOverlay');
  if (overlay) {
    overlay.classList.remove('active');
    overlay.setAttribute('aria-hidden', 'true');
  }
}

async function captureCameraImage() {
  const video = document.getElementById('cameraVideo');
  if (!video || !video.videoWidth) {
    setCameraStatus('camera not ready');
    return;
  }

  setCameraStatus('capturing…');

  const maxDimension = 1600;
  const sourceWidth = video.videoWidth;
  const sourceHeight = video.videoHeight;
  const scale = Math.min(1, maxDimension / Math.max(sourceWidth, sourceHeight));
  const targetWidth = Math.round(sourceWidth * scale);
  const targetHeight = Math.round(sourceHeight * scale);

  const canvas = document.createElement('canvas');
  canvas.width = targetWidth;
  canvas.height = targetHeight;
  const ctx = canvas.getContext('2d', { alpha: false });
  ctx.drawImage(video, 0, 0, targetWidth, targetHeight);

  const dataUrl = canvas.toDataURL('image/jpeg', 0.82);
  const sizeKb = Math.round((dataUrl.length * 0.75) / 1024);

  state.capturedImage = dataUrl;
  state.capturedMeta = { width: targetWidth, height: targetHeight, sizeKb };
  state.cameraStage = 'prepare';
  state.cameraMessage = 'Preparing image for recognition.';
  state.activeTab = 'scan';
  state.selectedFoodId = '';

  closeCameraOverlay();
  render();
  runCameraFoundationPipeline();
}

function runCameraFoundationPipeline() {
  const steps = [
    ['barcode', 'Looking for barcode. Barcode recognition connects in the next build.'],
    ['ocr', 'Reading label placeholder. OCR connects after barcode.'],
    ['identify', 'Photo captured successfully. Camera pipeline operational. Next step: barcode recognition.'],
    ['complete', 'Photo captured successfully. Camera pipeline operational. Next step: barcode recognition.']
  ];

  steps.forEach(([stage, message], index) => {
    setTimeout(() => {
      state.cameraStage = stage;
      state.cameraMessage = message;
      render();
    }, 450 + index * 520);
  });
}

function focusManualSearch() {
  state.activeTab = 'scan';
  render();
  setTimeout(() => document.getElementById('foodQuery')?.focus(), 80);
}

function bindCameraOverlayEvents() {
  document.getElementById('cameraClose')?.addEventListener('click', closeCameraOverlay);
  document.getElementById('cameraShutter')?.addEventListener('click', captureCameraImage);
  document.getElementById('cameraRetry')?.addEventListener('click', openCameraOverlay);
  document.getElementById('cameraManualSearch')?.addEventListener('click', () => {
    closeCameraOverlay();
    focusManualSearch();
  });
  document.getElementById('cameraFlip')?.addEventListener('click', () => {
    cameraFacingMode = cameraFacingMode === 'environment' ? 'user' : 'environment';
    openCameraOverlay();
  });
}


function render() {
  const screen = document.getElementById('screen');
  document.body.classList.toggle('flare-active', state.mode === 'Flare');

  if (state.activeTab === 'home') screen.innerHTML = homeScreen();
  if (state.activeTab === 'scan') screen.innerHTML = scanScreen();
  if (state.activeTab === 'flare') screen.innerHTML = flareScreen();
  if (state.activeTab === 'me') screen.innerHTML = meScreen();

  document.querySelectorAll('.nav-button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === state.activeTab);
  });

  bindEvents();
}

function captureInputs() {
  const foodQuery = document.getElementById('foodQuery');
  const menuText = document.getElementById('menuText');
  const ingredientText = document.getElementById('ingredientText');
  const nutritionText = document.getElementById('nutritionText');
  const notes = document.getElementById('notes');

  if (foodQuery) state.foodQuery = foodQuery.value;
  if (menuText) state.menuText = menuText.value;
  if (ingredientText) state.ingredientText = ingredientText.value;
  if (nutritionText) state.nutritionText = nutritionText.value;
  if (notes) state.notes = notes.value;
}

function bindEvents() {
  document.querySelectorAll('.nav-button').forEach(btn => {
    btn.onclick = () => {
      captureInputs();
      state.activeTab = btn.dataset.tab;
      state.meScreen = 'main';
      state.savedNotice = '';
      state.modeInfoOpen = false;
      state.infoTopic = '';
      render();
      if (btn.dataset.tab === 'scan') setTimeout(openCameraOverlay, 80);
    };
  });

  document.querySelectorAll('[data-range]').forEach(btn => {
    btn.onclick = () => {
      state.range = btn.dataset.range;
      render();
    };
  });

  document.querySelectorAll('[data-mode]').forEach(btn => {
    btn.onclick = () => {
      setMode(btn.dataset.mode);
    };
  });

  document.querySelectorAll('[data-set]').forEach(btn => {
    btn.onclick = () => {
      state[btn.dataset.set] = btn.dataset.value;
      render();
    };
  });

  const pain = document.getElementById('painLevel');
  if (pain) {
    pain.oninput = event => {
      state.painLevel = Number(event.target.value);
      render();
    };
  }

  ['foodQuery', 'menuText', 'ingredientText', 'nutritionText', 'notes'].forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      el.oninput = () => {
        captureInputs();
        // Do not re-render while typing. Re-rendering steals focus on mobile/desktop.
      };
      if (id === 'foodQuery') {
        el.onkeydown = event => {
          if (event.key === 'Enter') {
            event.preventDefault();
            captureInputs();
            state.selectedFoodId = '';
            render();
          }
        };
      }
    }
  });

  document.querySelectorAll('[data-action]').forEach(btn => {
    btn.onclick = () => {
      captureInputs();
      const action = btn.dataset.action;

      if (action === 'open-camera') { render(); setTimeout(openCameraOverlay, 80); return; }
      if (action === 'manual-search-focus') { focusManualSearch(); return; }

      if (action === 'mode-info') { state.modeInfoOpen = !state.modeInfoOpen; state.infoTopic = ''; render(); return; }
      if (action === 'rating-info') { state.infoTopic = state.infoTopic === 'rating-' + btn.dataset.rating ? '' : 'rating-' + btn.dataset.rating; state.modeInfoOpen = false; render(); return; }
      if (action === 'gut-info') { state.infoTopic = state.infoTopic === 'gut-check' ? '' : 'gut-check'; state.modeInfoOpen = false; render(); return; }
      if (action === 'close-info') { state.infoTopic = ''; render(); return; }
      if (action === 'scan') { state.activeTab = 'scan'; state.selectedFoodId = ''; cameraOpeningFromScanTab = true; }
      if (action === 'flare') state.activeTab = 'flare';
      if (action === 'daily-log') { state.activeTab = 'me'; state.meScreen = 'daily-log'; }
      if (action === 'trends') { state.activeTab = 'me'; state.meScreen = 'trends'; }
      if (action === 'my-foods') state.meScreen = 'my-foods';
      if (action === 'notes') state.meScreen = 'notes';
      if (action === 'history') state.meScreen = 'history';
      if (action === 'settings') state.meScreen = 'settings';
      if (action === 'me-main') { state.meScreen = 'main'; state.savedNotice = ''; }
      if (action === 'bathroom-minus') state.bathroomTrips = Math.max(0, state.bathroomTrips - 1);
      if (action === 'bathroom-plus') state.bathroomTrips += 1;
      if (action === 'save-log') {
        state.savedNotice = 'Gut Check saved locally for today.';
        state.gutCheckDate = new Date().toISOString().slice(0, 10);
        localStorage.setItem('bbbGutCheckDate', state.gutCheckDate);
        state.activeTab = 'home';
        state.meScreen = 'main';
      }
      if (action === 'food-search') { state.selectedFoodId = ''; }
      if (action === 'clear-food-search') { state.foodQuery = ''; state.selectedFoodId = ''; }
      if (action === 'quick-search') { state.foodQuery = btn.dataset.query || ''; state.selectedFoodId = ''; }
      if (action === 'back-to-results') { document.getElementById('results-start')?.scrollIntoView({ behavior: 'smooth', block: 'start' }); return; }
      if (action === 'back-to-scan') { state.selectedFoodId = ''; }
      if (action === 'view-food') { state.selectedFoodId = btn.dataset.foodId; state.activeTab = 'scan'; }
      if (btn.dataset.foodId && !action) { state.selectedFoodId = btn.dataset.foodId; state.activeTab = 'scan'; }
      if (action === 'add-cupboard') {
        const food = findFoodById(btn.dataset.foodId);
        if (food && !state.cupboardItems.some(entry => entry.id === food.id)) {
          state.cupboardItems.unshift({ id: food.id, name: food.name, brand: food.brand, rating: getRatingLabel(ratingForCurrentMode(food)), mode: state.mode, timestamp: new Date().toISOString() });
          state.cupboardItems = state.cupboardItems.slice(0, 100);
          localStorage.setItem('bbbCupboardItems', JSON.stringify(state.cupboardItems));
          state.savedNotice = 'saved to Your Cupboard.';
        } else if (food) {
          state.savedNotice = 'already saved to your cupboard.';
        }
      }
      if (action === 'log-food') {
        const food = findFoodById(btn.dataset.foodId);
        if (food) {
          state.foodLogs.unshift({ id: food.id, name: food.name, brand: food.brand, rating: getRatingLabel(ratingForCurrentMode(food)), mode: state.mode, timestamp: new Date().toISOString() });
          state.foodLogs = state.foodLogs.slice(0, 50);
          localStorage.setItem('bbbFoodLogs', JSON.stringify(state.foodLogs));
          state.savedNotice = 'ate it logged locally.';
        }
      }
      if (action === 'save-food-note') { state.savedNotice = 'Personal food notes come next.'; }

      render();
      if (cameraOpeningFromScanTab) {
        cameraOpeningFromScanTab = false;
        setTimeout(openCameraOverlay, 80);
      }
    };
  });
}

render();
hydrateStaticIcons();
bindCameraOverlayEvents();
  </script>

  const target = e.target.closest('button, .counter-btn, .tap-choice, .nav-button, .mode-pill');
  if (target) {

    target.click();

}, { passive: false });

<script>
/* v1.0.1 flare class mirror */
(function(){
  function syncFlareClass(){
    const pill = document.querySelector('.mode-pill');
    const pillSaysFlare = pill && /flare/i.test(pill.innerText || "");
    const stored = localStorage.getItem('bbbFlareMode') || localStorage.getItem('flareMode') || "";
    const storedFlare = stored === "true" || stored === "flare";
    document.body.classList.toggle('flare-mode', !!(pillSaysFlare || storedFlare));
  }
  document.addEventListener('DOMContentLoaded', syncFlareClass);
  document.addEventListener('click', function(){ setTimeout(syncFlareClass, 60); }, true);
  setInterval(syncFlareClass, 1000);
})();
</script>
