<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bill's bad belly</title>
  <style>
:root {
  --gunmetal: #1b2027;
  --gunmetal-soft: #242b34;
  --gunmetal-light: #303946;
  --purple: #7d5f86;
  --purple-light: #b89ac0;
  --cream: #f3edf4;
  --muted: #b8b0ba;
  --shadow: rgba(0, 0, 0, 0.35);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  background: radial-gradient(circle at top, #303946 0%, var(--gunmetal) 45%, #11151a 100%);
  color: var(--cream);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

button, input, textarea { font: inherit; }

button {
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.app-shell {
  width: min(100%, 430px);
  min-height: 100vh;
  margin: 0 auto;
  padding: 22px 16px 92px;
  position: relative;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 18px;
}

.eyebrow {
  margin: 0 0 4px;
  color: var(--purple-light);
  font-size: 0.78rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

h1 {
  margin: 0;
  font-size: 2rem;
  line-height: 1;
  letter-spacing: -0.04em;
  text-transform: lowercase;
}

.logo-mark {
  width: 54px;
  height: 54px;
  border-radius: 18px;
  display: grid;
  place-items: center;
  background: linear-gradient(145deg, var(--purple), #513d59);
  box-shadow: 0 14px 30px var(--shadow), inset 0 1px 0 rgba(255,255,255,.2);
  color: white;
  font-weight: 800;
  letter-spacing: -0.08em;
  text-transform: lowercase;
}

.screen-card {
  min-height: calc(100vh - 142px);
  background: rgba(36, 43, 52, 0.78);
  border: 1px solid rgba(184, 154, 192, 0.25);
  border-radius: 28px;
  padding: 18px;
  box-shadow: 0 20px 50px var(--shadow);
  backdrop-filter: blur(12px);
}

.screen-content { display: grid; gap: 16px; }

.screen-title p {
  margin: 0 0 6px;
  color: var(--purple-light);
  font-weight: 700;
}

.screen-title h2 {
  margin: 0;
  font-size: 1.35rem;
  line-height: 1.2;
  letter-spacing: -0.03em;
}

.belly-meter,
.camera-placeholder,
.action-card,
.list-row,
.blueprint-box,
.result-card,
.food-panel,
.input-card,
.baseline-card {
  border: 1px solid rgba(184, 154, 192, 0.22);
  background: linear-gradient(145deg, rgba(48, 57, 70, 0.96), rgba(27, 32, 39, 0.95));
  border-radius: 22px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
}

.belly-meter {
  display: flex;
  gap: 16px;
  align-items: center;
  padding: 18px;
}

.icon { color: var(--purple-light); font-size: 1.55rem; line-height: 1; display: inline-grid; place-items: center; }
.icon svg { width: 24px; height: 24px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.belly-meter .icon svg { width: 42px; height: 42px; }
.camera-placeholder .icon svg { width: 54px; height: 54px; }
.nav-button .icon svg { width: 22px; height: 22px; }

.belly-meter p,
.belly-meter strong,
.belly-meter span { display: block; }
.belly-meter p { margin: 0 0 3px; color: var(--muted); }
.belly-meter strong { font-size: 1.8rem; line-height: 1; }
.belly-meter span { margin-top: 6px; color: var(--muted); font-size: .9rem; }

.segmented-control,
.mode-toggle {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 8px;
  border-radius: 18px;
  background: rgba(17, 21, 26, 0.5);
}

.mode-toggle { grid-template-columns: repeat(2, 1fr); }

.segmented-control button,
.mode-toggle button {
  border: 0;
  border-radius: 13px;
  padding: 10px 8px;
  color: var(--cream);
  background: transparent;
}

.segmented-control button.selected,
.mode-toggle button.selected {
  background: var(--purple);
  color: white;
  box-shadow: 0 10px 24px rgba(125,95,134,.28);
}

.grid.two {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

.action-card {
  padding: 16px;
  min-height: 132px;
  color: var(--cream);
  text-align: left;
}
.action-card h3 { margin: 12px 0 6px; font-size: 1rem; }
.action-card p { margin: 0; color: var(--muted); font-size: .88rem; line-height: 1.35; }

.camera-placeholder {
  display: grid;
  place-items: center;
  min-height: 230px;
  padding: 24px;
  text-align: center;
  border-style: dashed;
}
.camera-placeholder p { margin: 12px 0 4px; font-weight: 800; }
.camera-placeholder span { color: var(--muted); }

.list-stack { display: grid; gap: 10px; }
.list-row {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px;
  color: var(--cream);
  text-align: left;
}
.list-row strong { margin-left: auto; color: var(--purple-light); font-size: 1.4rem; }

.blueprint-box { padding: 14px 16px; }
.blueprint-box summary { cursor: pointer; color: var(--purple-light); font-weight: 700; }
.blueprint-box pre { white-space: pre-wrap; color: var(--muted); line-height: 1.4; font-size: .82rem; }

.bottom-nav {
  position: fixed;
  left: 50%;
  bottom: 16px;
  transform: translateX(-50%);
  width: min(calc(100% - 24px), 430px);
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  padding: 10px;
  border: 1px solid rgba(184,154,192,.28);
  border-radius: 24px;
  background: rgba(27, 32, 39, 0.94);
  box-shadow: 0 18px 50px rgba(0,0,0,.55);
  backdrop-filter: blur(14px);
}

.nav-button {
  display: grid;
  place-items: center;
  gap: 4px;
  border: 0;
  border-radius: 17px;
  padding: 10px 4px;
  min-height: 62px;
  background: transparent;
  color: var(--muted);
}

.nav-button span { font-size: .74rem; font-weight: 700; }
.nav-button.active {
  color: white;
  background: linear-gradient(145deg, var(--purple), #5e4867);
}

/* ---------- DAILY LOG ---------- */

.back-button {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  width: fit-content;
  border: 1px solid rgba(184, 154, 192, 0.22);
  border-radius: 16px;
  padding: 10px 14px;
  background: linear-gradient(145deg, rgba(48, 57, 70, 0.96), rgba(27, 32, 39, 0.95));
  color: var(--cream);
}

.log-section {
  display: grid;
  gap: 12px;
  padding: 16px;
  border-radius: 22px;
  border: 1px solid rgba(184, 154, 192, 0.22);
  background: linear-gradient(145deg, rgba(48, 57, 70, 0.96), rgba(27, 32, 39, 0.95));
}

.log-section h3 {
  margin: 0;
  color: var(--purple-light);
}

.tap-group {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.tap-group button {
  border: 0;
  border-radius: 14px;
  padding: 12px;
  background: rgba(17, 21, 26, 0.65);
  color: var(--cream);
}

.tap-group button.selected {
  background: var(--purple);
  color: white;
  box-shadow: 0 10px 24px rgba(125, 95, 134, 0.28);
}

.counter-control {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 12px;
}

.counter-control button {
  border: 0;
  border-radius: 16px;
  padding: 14px;
  min-height: 52px;
  background: rgba(17, 21, 26, 0.65);
  color: var(--cream);
}

.counter-control strong {
  font-size: 2rem;
  text-align: center;
  min-width: 48px;
}

.pain-slider { width: 100%; }

.notes-box,
.text-input,
.search-box {
  width: 100%;
  border: 1px solid rgba(184, 154, 192, 0.22);
  border-radius: 16px;
  padding: 12px;
  background: rgba(17, 21, 26, 0.5);
  color: var(--cream);
}

.notes-box {
  min-height: 90px;
  resize: vertical;
}

.text-input {
  min-height: 96px;
  resize: vertical;
}

.notes-box::placeholder,
.text-input::placeholder,
.search-box::placeholder {
  color: var(--muted);
}

.full-width { width: 100%; }

.recent-logs { display: grid; gap: 10px; }

.recent-log-card {
  display: grid;
  gap: 4px;
  padding: 14px;
  border-radius: 18px;
  border: 1px solid rgba(184, 154, 192, 0.18);
  background: rgba(17, 21, 26, 0.45);
}

.button-stack {
  display: grid;
  gap: 10px;
}

.primary-action,
.secondary-action {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 48px;
  border-radius: 16px;
  padding: 12px 16px;
  color: var(--cream);
}

.primary-action {
  border: 0;
  background: linear-gradient(145deg, var(--purple), #5e4867);
  box-shadow: 0 10px 24px rgba(125,95,134,.28);
}

.secondary-action {
  border: 1px solid rgba(184,154,192,.28);
  background: rgba(17,21,26,.5);
}

.results-panel,
.panel-list {
  display: grid;
  gap: 10px;
}

.result-card,
.food-panel,
.input-card,
.baseline-card {
  padding: 14px;
}

.result-card h3,
.food-panel h3,
.input-card h3,
.baseline-card h3 {
  margin: 0 0 8px;
  color: var(--purple-light);
}

.result-card p,
.input-card p,
.baseline-card p {
  margin: 0;
  color: var(--muted);
  line-height: 1.4;
}

.result-card ul,
.food-panel ul {
  margin: 6px 0 0;
  padding-left: 20px;
  color: var(--cream);
}

.food-panel-title {
  display: flex;
  align-items: center;
  gap: 10px;
}

.save-notice {
  margin: 0;
  color: var(--purple-light);
  font-weight: 700;
}

.small-muted {
  color: var(--muted);
  font-size: .88rem;
}

.baseline-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.baseline-stat {
  padding: 12px 8px;
  border-radius: 16px;
  background: rgba(17, 21, 26, 0.45);
  text-align: center;
}

.baseline-stat span {
  display: block;
  color: var(--muted);
  font-size: .72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
}

.baseline-stat strong {
  display: block;
  margin-top: 5px;
  font-size: 1rem;
  line-height: 1.15;
}

.baseline-actions {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-top: 12px;
}

@media (max-width: 360px) {
  .grid.two { grid-template-columns: 1fr; }
  .baseline-grid { grid-template-columns: 1fr; }
  h1 { font-size: 1.72rem; }
}
  </style>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Version 0.4</p>
        <h1>bill's bad belly</h1>
      </div>
      <div class="logo-mark" aria-hidden="true">bb</div>
    </header>

    <section class="screen-card" id="screen">
      <div class="screen-content">
        <div class="screen-title">
          <p>Home</p>
          <h2>Loading bill's bad belly...</h2>
        </div>
        <div class="belly-meter">
          <span class="icon">bb</span>
          <div>
            <p>Belly Meter</p>
            <strong>Steady</strong>
            <span>If this message stays on screen, the preview is not running JavaScript. Open the file in Safari/Chrome or upload it as index.html to GitHub Pages.</span>
          </div>
        </div>
      </div>
    </section>

    <nav class="bottom-nav" aria-label="Main navigation">
      <button class="nav-button active" data-tab="home" type="button"><span class="icon" data-nav-icon="home"></span><span>Home</span></button>
      <button class="nav-button" data-tab="scan" type="button"><span class="icon" data-nav-icon="camera"></span><span>Scan</span></button>
      <button class="nav-button" data-tab="flare" type="button"><span class="icon" data-nav-icon="activity"></span><span>Flare</span></button>
      <button class="nav-button" data-tab="me" type="button"><span class="icon" data-nav-icon="user"></span><span>Me</span></button>
    </nav>
  </main>

  <script>
const FOOD_INDEX = {
  good: ['White rice', 'Bananas', 'Plain chicken', 'Applesauce', 'White bread', 'Saltines'],
  caution: ['Pizza', 'Dairy', 'Coffee', 'Carbonated drinks', 'Ground beef'],
  avoid: ['Seeds', 'Nuts', 'Raw vegetables', 'Fried foods', 'Pepperoni', 'Popcorn']
};

const state = {
  activeTab: 'home',
  meScreen: 'main',
  range: 'today',
  mode: 'Normal',
  bellyStatus: 'Good',
  painLevel: 0,
  bathroomTrips: 0,
  urgency: 'None',
  notes: '',
  savedNotice: '',
  foodQuery: '',
  menuText: '',
  ingredientText: '',
  nutritionText: '',
  baselineStatus: 'Good',
  baselinePain: 0,
  baselineTrips: 0,
  baselineSaved: false
};

function svg(paths) {
  return `<svg viewBox="0 0 24 24" aria-hidden="true">${paths}</svg>`;
}

const icons = {
  home: svg('<path d="M3 11.5 12 4l9 7.5"></path><path d="M5.5 10.5V20h5v-5h3v5h5v-9.5"></path>'),
  camera: svg('<path d="M4 8h3l1.5-2h7L17 8h3v10H4z"></path><circle cx="12" cy="13" r="3"></circle>'),
  activity: svg('<path d="M3 12h4l2-7 4 14 2-7h6"></path>'),
  user: svg('<circle cx="12" cy="8" r="3.2"></circle><path d="M5 20c1.2-4 12.8-4 14 0"></path>'),
  gauge: svg('<path d="M4 15a8 8 0 1 1 16 0"></path><path d="M12 15l4-4"></path><path d="M6.5 15h.1"></path><path d="M17.5 15h.1"></path>'),
  clipboard: svg('<rect x="6" y="5" width="12" height="16" rx="2"></rect><path d="M9 5a3 3 0 0 1 6 0"></path><path d="M9 11h6"></path><path d="M9 15h6"></path>'),
  zap: svg('<path d="M13 2 5 14h6l-1 8 8-12h-6z"></path>'),
  calendar: svg('<rect x="4" y="5" width="16" height="15" rx="2"></rect><path d="M8 3v4"></path><path d="M16 3v4"></path><path d="M4 10h16"></path>'),
  apple: svg('<path d="M12 7c-3-3-8-.5-7 5 1 6 5 8 7 5 2 3 6 1 7-5 1-5-4-8-7-5z"></path><path d="M12 7c0-2 1-4 4-4"></path>'),
  notes: svg('<path d="M4 20h16"></path><path d="M6 16 17 5l2 2L8 18H6z"></path>'),
  history: svg('<path d="M3 12a9 9 0 1 0 3-6.7"></path><path d="M3 4v6h6"></path><path d="M12 7v5l3 2"></path>'),
  settings: svg('<circle cx="12" cy="12" r="3"></circle><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.4-2.4 1a7 7 0 0 0-1.7-1L14.5 3h-5l-.3 3.1a7 7 0 0 0-1.7 1l-2.4-1-2 3.4 2 1.5A7 7 0 0 0 5 12a7 7 0 0 0 .1 1l-2 1.5 2 3.4 2.4-1a7 7 0 0 0 1.7 1l.3 3.1h5l.3-3.1a7 7 0 0 0 1.7-1l2.4 1 2-3.4-2-1.5a7 7 0 0 0 .1-1z"></path>'),
  shield: svg('<path d="M12 3 19 6v5c0 5-3.5 8.5-7 10-3.5-1.5-7-5-7-10V6z"></path><path d="m9 12 2 2 4-5"></path>'),
  ban: svg('<circle cx="12" cy="12" r="8"></circle><path d="M7 7l10 10"></path>'),
  upload: svg('<path d="M12 16V4"></path><path d="m7 9 5-5 5 5"></path><path d="M5 20h14"></path>'),
  search: svg('<circle cx="11" cy="11" r="6"></circle><path d="m16 16 4 4"></path>'),
  back: svg('<path d="M15 18 9 12l6-6"></path>'),
  minus: svg('<path d="M5 12h14"></path>'),
  plus: svg('<path d="M12 5v14"></path><path d="M5 12h14"></path>')
};

function hydrateStaticIcons() {
  document.querySelectorAll('[data-nav-icon]').forEach(el => {
    const key = el.dataset.navIcon;
    el.innerHTML = icons[key] || '';
  });
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, char => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
  }[char]));
}

function normalizeText(text) {
  return String(text || '').toLowerCase().replace(/carbonated beverage/g, 'carbonated drinks');
}

function singularize(food) {
  const lower = food.toLowerCase();
  if (lower === 'carbonated drinks') return ['carbonated drinks', 'carbonated drink', 'carbonated beverage', 'carbonated beverages'];
  if (lower === 'raw vegetables') return ['raw vegetables', 'raw vegetable'];
  if (lower === 'fried foods') return ['fried foods', 'fried food'];
  return [lower];
}

function scanFoods(text) {
  const normalized = normalizeText(text);
  const result = { good: [], caution: [], avoid: [] };

  Object.entries(FOOD_INDEX).forEach(([category, foods]) => {
    foods.forEach(food => {
      const matches = singularize(food).some(term => normalized.includes(term));
      if (matches) result[category].push(food === 'Carbonated drinks' && normalized.includes('carbonated beverage') ? 'Carbonated beverage' : food);
    });
  });

  return result;
}

function renderFoodResults(result) {
  return `
    <div class="results-panel">
      ${resultCard('Good Foods', result.good)}
      ${resultCard('Caution Foods', result.caution)}
      ${resultCard('Avoid Foods', result.avoid)}
    </div>
  `;
}

function resultCard(label, foods) {
  if (!foods || foods.length === 0) {
    return `<article class="result-card"><h3>${label}</h3><p>- none</p></article>`;
  }

  return `
    <article class="result-card">
      <h3>${label}</h3>
      <ul>${foods.map(food => `<li>${escapeHtml(food)}</li>`).join('')}</ul>
    </article>
  `;
}

function screenTitle(title, subtitle) {
  return `
    <div class="screen-title">
      <p>${escapeHtml(title)}</p>
      <h2>${escapeHtml(subtitle)}</h2>
    </div>
  `;
}

function actionCard(icon, title, text, target) {
  return `
    <button class="action-card" data-action="${target}" type="button">
      <span class="icon">${icon}</span>
      <h3>${escapeHtml(title)}</h3>
      <p>${escapeHtml(text)}</p>
    </button>
  `;
}

function listRow(icon, title, target) {
  return `
    <button class="list-row" data-action="${target}" type="button">
      <span class="icon">${icon}</span>
      <span>${escapeHtml(title)}</span>
      <strong>›</strong>
    </button>
  `;
}

function tapGroup(options, value, field) {
  return `
    <div class="tap-group">
      ${options.map(option => `
        <button class="${value === option ? 'selected' : ''}" data-set="${field}" data-value="${escapeHtml(option)}" type="button">${escapeHtml(option)}</button>
      `).join('')}
    </div>
  `;
}

function logSection(title, body) {
  return `<section class="log-section"><h3>${title}</h3>${body}</section>`;
}

function homeScreen() {
  const ranges = [
    { id: 'today', label: 'Today' },
    { id: 'week', label: '7 Days' },
    { id: 'month', label: '30 Days' },
  ];
  const currentLabel = ranges.find(item => item.id === state.range)?.label || 'Today';
  const baselineNote = state.baselineSaved ? 'Baseline saved for this session.' : 'Set today’s starting point before meals or symptoms change.';

  return `
    <div class="screen-content">
      ${screenTitle('Home', 'Can I safely eat this right now?')}

      <div class="belly-meter">
        <span class="icon">${icons.gauge}</span>
        <div>
          <p>Belly Meter</p>
          <strong>Steady</strong>
          <span>${currentLabel} view — placeholder trend status.</span>
        </div>
      </div>

      <div class="segmented-control">
        ${ranges.map(item => `
          <button class="${state.range === item.id ? 'selected' : ''}" data-range="${item.id}" type="button">${item.label}</button>
        `).join('')}
      </div>

      <section class="baseline-card">
        <h3>Today’s Baseline</h3>
        <p>${baselineNote}</p>
        <div style="height:12px"></div>
        <div class="baseline-grid">
          <div class="baseline-stat"><span>Status</span><strong>${escapeHtml(state.baselineStatus)}</strong></div>
          <div class="baseline-stat"><span>Pain</span><strong>${state.baselinePain}/10</strong></div>
          <div class="baseline-stat"><span>Trips</span><strong>${state.baselineTrips}</strong></div>
        </div>
        <div style="height:12px"></div>
        ${tapGroup(['Good', 'Ehhh', 'Rough', 'Flare'], state.baselineStatus, 'baselineStatus')}
        ${logSection(`Baseline Pain: ${state.baselinePain}`, `
          <input class="pain-slider" id="baselinePain" type="range" min="0" max="10" value="${state.baselinePain}" />
        `)}
        <div class="counter-control">
          <button type="button" data-action="baseline-trips-minus"><span>${icons.minus}</span></button>
          <strong>${state.baselineTrips}</strong>
          <button type="button" data-action="baseline-trips-plus"><span>${icons.plus}</span></button>
        </div>
        <div class="baseline-actions">
          <button class="primary-action" data-action="save-baseline" type="button">Save Baseline</button>
          <button class="secondary-action" data-action="daily-log" type="button">Daily Log</button>
        </div>
      </section>

      <div class="grid two">
        ${actionCard(icons.camera, 'Scan Food', 'Check a meal, snack, label, or menu.', 'scan')}
        ${actionCard(icons.clipboard, 'Daily Log', 'Quick symptom and food note.', 'daily-log')}
        ${actionCard(icons.zap, 'Flare Help', 'Switch to stricter guidance.', 'flare')}
        ${actionCard(icons.calendar, 'Trends', 'Future symptom patterns.', 'trends')}
      </div>
    </div>
  `;
}

function scanScreen() {
  const searchResults = scanFoods(state.foodQuery);
  const combinedText = [state.menuText, state.ingredientText, state.nutritionText].join(' ');
  const textResults = scanFoods(combinedText);

  return `
    <div class="screen-content">
      ${screenTitle('Scan', "Photo-based Crohn's food check shell.")}

      <div class="camera-placeholder">
        <span class="icon" style="font-size:3rem">${icons.camera}</span>
        <p>Camera Placeholder</p>
        <span>Future OCR hook location. Image capture and AI analysis come later.</span>
      </div>

      <div class="button-stack">
        <button class="primary-action" type="button">
          <span>${icons.upload}</span>
          Upload Image Placeholder
        </button>

        <button class="secondary-action" type="button">
          <span>${icons.search}</span>
          Camera/OCR Placeholder
        </button>
      </div>

      <div class="input-card">
        <h3>Food Search</h3>
        <input class="search-box" id="foodQuery" value="${escapeHtml(state.foodQuery)}" placeholder="pepperoni pizza" />
        <div style="height:10px"></div>
        <button class="primary-action full-width" data-action="food-search" type="button"><span>${icons.search}</span> Search</button>
      </div>

      ${state.foodQuery.trim() ? renderFoodResults(searchResults) : `
        <div class="results-panel">
          ${resultCard('Good Foods', [])}
          ${resultCard('Caution Foods', [])}
          ${resultCard('Avoid Foods', [])}
        </div>
      `}

      <div class="input-card">
        <h3>Text Analysis Prototype</h3>
        <p>Paste menu text, ingredients, or nutrition label text. The app checks it against the food index.</p>
      </div>

      <textarea class="text-input" id="menuText" placeholder="Paste menu text">${escapeHtml(state.menuText)}</textarea>
      <textarea class="text-input" id="ingredientText" placeholder="Paste ingredient list">${escapeHtml(state.ingredientText)}</textarea>
      <textarea class="text-input" id="nutritionText" placeholder="Paste nutrition label text">${escapeHtml(state.nutritionText)}</textarea>

      ${combinedText.trim() ? renderFoodResults(textResults) : ''}
    </div>
  `;
}

function flareScreen() {
  return `
    <div class="screen-content">
      ${screenTitle('Flare', 'Normal and flare-mode food guidance.')}

      <div class="mode-toggle">
        ${['Normal', 'Flare'].map(item => `
          <button class="${state.mode === item ? 'selected' : ''}" data-mode="${item}" type="button">${item} Mode</button>
        `).join('')}
      </div>

      <div class="panel-list">
        ${foodPanel(icons.shield, 'Safe Foods', FOOD_INDEX.good.slice(0, 4))}
        ${foodPanel(icons.ban, 'Avoid Foods', ['Seeds', 'Raw vegetables', 'Fried foods', 'Carbonated drinks'])}
      </div>
    </div>
  `;
}

function foodPanel(icon, title, foods) {
  return `
    <article class="food-panel">
      <div class="food-panel-title">
        <span class="icon">${icon}</span>
        <h3>${escapeHtml(title)}</h3>
      </div>
      <ul>${foods.map(food => `<li>${escapeHtml(food)}</li>`).join('')}</ul>
    </article>
  `;
}

function meScreen() {
  if (state.meScreen === 'daily-log') return dailyLogScreen();
  if (state.meScreen === 'my-foods') return myFoodsScreen();
  if (state.meScreen === 'notes') return notesScreen();
  if (state.meScreen === 'history') return historyScreen();
  if (state.meScreen === 'settings') return settingsScreen();
  if (state.meScreen === 'trends') return trendsScreen();

  return `
    <div class="screen-content">
      ${screenTitle('Me', 'Personal food profile and app records.')}

      <div class="list-stack">
        ${listRow(icons.apple, 'My Foods', 'my-foods')}
        ${listRow(icons.clipboard, 'Daily Log', 'daily-log')}
        ${listRow(icons.notes, 'Notes', 'notes')}
        ${listRow(icons.history, 'History', 'history')}
        ${listRow(icons.settings, 'Settings', 'settings')}
      </div>
    </div>
  `;
}

function backButton() {
  return `<button class="back-button" data-action="me-main" type="button"><span>${icons.back}</span> Back</button>`;
}

function dailyLogScreen() {
  return `
    <div class="screen-content">
      ${backButton()}
      ${screenTitle('Me → Daily Log', "10-second Crohn's check-in.")}

      ${logSection('Belly Status', tapGroup(['Good', 'Ehhh', 'Rough', 'Flare'], state.bellyStatus, 'bellyStatus'))}

      ${logSection(`Pain Level: ${state.painLevel}`, `
        <input class="pain-slider" id="painLevel" type="range" min="0" max="10" value="${state.painLevel}" />
      `)}

      ${logSection('Bathroom Trips', `
        <div class="counter-control">
          <button type="button" data-action="bathroom-minus"><span>${icons.minus}</span></button>
          <strong>${state.bathroomTrips}</strong>
          <button type="button" data-action="bathroom-plus"><span>${icons.plus}</span></button>
        </div>
      `)}

      ${logSection('Urgency', tapGroup(['None', 'Mild', 'Moderate', 'Severe'], state.urgency, 'urgency'))}

      ${logSection('Optional Notes', `
        <textarea class="notes-box" id="notes" placeholder="Anything worth remembering?">${escapeHtml(state.notes)}</textarea>
      `)}

      <button class="primary-action full-width" data-action="save-log" type="button">Save Log</button>
      ${state.savedNotice ? `<p class="save-notice">${escapeHtml(state.savedNotice)}</p>` : ''}

      <div class="recent-logs">
        <h3>Recent Logs</h3>

        <div class="recent-log-card">
          <strong>June 15</strong>
          <span>Status: Okay</span>
          <span>Pain: 2</span>
        </div>

        <div class="recent-log-card">
          <strong>June 14</strong>
          <span>Status: Good</span>
          <span>Pain: 1</span>
        </div>

        <div class="recent-log-card">
          <strong>June 13</strong>
          <span>Status: Rough</span>
          <span>Pain: 5</span>
        </div>
      </div>
    </div>
  `;
}

function myFoodsScreen() {
  return `
    <div class="screen-content">
      ${backButton()}
      ${screenTitle('Me → My Foods', 'First working personal food index.')}
      ${foodPanel(icons.shield, 'Good', FOOD_INDEX.good)}
      ${foodPanel('!', 'Caution', FOOD_INDEX.caution)}
      ${foodPanel(icons.ban, 'Avoid', FOOD_INDEX.avoid)}
    </div>
  `;
}

function notesScreen() {
  return `
    <div class="screen-content">
      ${backButton()}
      ${screenTitle('Me → Notes', 'Quick notes without a diary-style form.')}
      <div class="input-card">
        <h3>Notes Placeholder</h3>
        <p>Future quick-note capture can live here. For this build, Daily Log notes remain active on the Daily Log screen.</p>
      </div>
    </div>
  `;
}

function historyScreen() {
  return `
    <div class="screen-content">
      ${backButton()}
      ${screenTitle('Me → History', 'Recent app records placeholder.')}
      <div class="recent-logs">
        <div class="recent-log-card"><strong>June 15</strong><span>Status: Okay</span><span>Pain: 2</span></div>
        <div class="recent-log-card"><strong>June 14</strong><span>Status: Good</span><span>Pain: 1</span></div>
        <div class="recent-log-card"><strong>June 13</strong><span>Status: Rough</span><span>Pain: 5</span></div>
      </div>
    </div>
  `;
}

function settingsScreen() {
  return `
    <div class="screen-content">
      ${backButton()}
      ${screenTitle('Me → Settings', 'App setup placeholder.')}
      <div class="input-card">
        <h3>Build 5 Settings</h3>
        <p>Single-file GitHub Pages build. No React, Vite, npm, build step, dist, or node_modules.</p>
      </div>
    </div>
  `;
}

function trendsScreen() {
  return `
    <div class="screen-content">
      ${backButton()}
      ${screenTitle('Me → Trends', 'Future symptom patterns.')}
      <div class="belly-meter">
        <span class="icon">${icons.calendar}</span>
        <div>
          <p>Trend Placeholder</p>
          <strong>Steady</strong>
          <span>Today / 7 Days / 30 Days selector is active on Home. Deeper patterns come later.</span>
        </div>
      </div>
    </div>
  `;
}

function render() {
  const screen = document.getElementById('screen');

  if (state.activeTab === 'home') screen.innerHTML = homeScreen();
  if (state.activeTab === 'scan') screen.innerHTML = scanScreen();
  if (state.activeTab === 'flare') screen.innerHTML = flareScreen();
  if (state.activeTab === 'me') screen.innerHTML = meScreen();

  document.querySelectorAll('.nav-button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === state.activeTab);
  });

  hydrateStaticIcons();
  bindEvents();
}

function captureInputs() {
  const foodQuery = document.getElementById('foodQuery');
  const menuText = document.getElementById('menuText');
  const ingredientText = document.getElementById('ingredientText');
  const nutritionText = document.getElementById('nutritionText');
  const notes = document.getElementById('notes');

  if (foodQuery) state.foodQuery = foodQuery.value;
  if (menuText) state.menuText = menuText.value;
  if (ingredientText) state.ingredientText = ingredientText.value;
  if (nutritionText) state.nutritionText = nutritionText.value;
  if (notes) state.notes = notes.value;
}

function bindEvents() {
  document.querySelectorAll('.nav-button').forEach(btn => {
    btn.onclick = () => {
      captureInputs();
      state.activeTab = btn.dataset.tab;
      state.meScreen = 'main';
      state.savedNotice = '';
      render();
    };
  });

  document.querySelectorAll('[data-range]').forEach(btn => {
    btn.onclick = () => {
      state.range = btn.dataset.range;
      render();
    };
  });

  document.querySelectorAll('[data-mode]').forEach(btn => {
    btn.onclick = () => {
      state.mode = btn.dataset.mode;
      render();
    };
  });

  document.querySelectorAll('[data-set]').forEach(btn => {
    btn.onclick = () => {
      state[btn.dataset.set] = btn.dataset.value;
      render();
    };
  });

  const pain = document.getElementById('painLevel');
  if (pain) {
    pain.oninput = event => {
      state.painLevel = Number(event.target.value);
      render();
    };
  }

  const baselinePain = document.getElementById('baselinePain');
  if (baselinePain) {
    baselinePain.oninput = event => {
      state.baselinePain = Number(event.target.value);
      render();
    };
  }

  ['foodQuery', 'menuText', 'ingredientText', 'nutritionText', 'notes'].forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      el.oninput = () => {
        captureInputs();
        if (id !== 'notes') render();
      };
    }
  });

  document.querySelectorAll('[data-action]').forEach(btn => {
    btn.onclick = () => {
      captureInputs();
      const action = btn.dataset.action;

      if (action === 'scan') state.activeTab = 'scan';
      if (action === 'flare') state.activeTab = 'flare';
      if (action === 'daily-log') { state.activeTab = 'me'; state.meScreen = 'daily-log'; }
      if (action === 'trends') { state.activeTab = 'me'; state.meScreen = 'trends'; }
      if (action === 'my-foods') state.meScreen = 'my-foods';
      if (action === 'notes') state.meScreen = 'notes';
      if (action === 'history') state.meScreen = 'history';
      if (action === 'settings') state.meScreen = 'settings';
      if (action === 'me-main') { state.meScreen = 'main'; state.savedNotice = ''; }
      if (action === 'bathroom-minus') state.bathroomTrips = Math.max(0, state.bathroomTrips - 1);
      if (action === 'bathroom-plus') state.bathroomTrips += 1;
      if (action === 'baseline-trips-minus') state.baselineTrips = Math.max(0, state.baselineTrips - 1);
      if (action === 'baseline-trips-plus') state.baselineTrips += 1;
      if (action === 'save-baseline') state.baselineSaved = true;
      if (action === 'save-log') state.savedNotice = 'Log saved locally for this session.';
      if (action === 'food-search') { /* input already captured */ }

      render();
    };
  });
}

document.addEventListener('DOMContentLoaded', () => {
  hydrateStaticIcons();
  render();
});
  </script>
</body>
</html>
